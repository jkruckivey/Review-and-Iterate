<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Value Chain Analyzer - Strategy Course Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Neutral Palette (Grays) */
            --color-neutral-50: #fafafa;
            --color-neutral-100: #f5f5f5;
            --color-neutral-200: #e5e5e5;
            --color-neutral-300: #d4d4d4;
            --color-neutral-400: #a3a3a3;
            --color-neutral-500: #737373;
            --color-neutral-600: #525252;
            --color-neutral-700: #404040;
            --color-neutral-800: #262626;
            --color-neutral-900: #171717;

            /* Semantic Colors */
            --color-success: #22c55e;
            --color-success-light: #dcfce7;
            --color-success-dark: #15803d;
            --color-error: #ef4444;
            --color-error-light: #fee2e2;
            --color-error-dark: #b91c1c;
            --color-warning: #f59e0b;
            --color-warning-light: #fcd34d;
            --color-warning-dark: #d97706;
            --color-info: #3b82f6;
            --color-info-light: #93c5fd;
            --color-info-dark: #1d4ed8;

            /* Knowledge Check Feedback (Subtle) */
            --color-correct: #c0d1cd;
            --color-correct-bg: #f0f5f4;
            --color-incorrect: #f0ede0;
            --color-incorrect-bg: #faf9f5;

            /* Accent Colors */
            --color-accent: #bfe5e7;
            --color-accent-dark: #5a9ea1;

            /* 3 Elements */
            --color-element-sage: #c0d1cd;
            --color-element-purple: #d5cae0;
            --color-element-blue: #bfe5e7;

            /* Focus state */
            --color-focus: #3182ce;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: white;
            color: var(--color-neutral-900);
            line-height: 1.6;
            padding: 2rem;
        }
        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--color-neutral-600);
        }

        .industry-select {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .industry-select label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .industry-select select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--color-neutral-300);
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            background: white;
        }

        .industry-select select:focus {
            outline: 2px solid var(--color-focus);
            outline-offset: 2px;
        }

        .analysis-section {
            display: none;
        }

        .analysis-section.active {
            display: block;
        }

        .value-chain-visual {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .value-chain-visual h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .chain-flow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 1rem 0;
        }

        .chain-stage {
            flex: 1;
            min-width: 120px;
            text-align: center;
            padding: 1rem;
            background: var(--color-neutral-100);
            border-radius: 6px;
            border: 2px solid var(--color-neutral-300);
            cursor: pointer;
            transition: all 0.2s;
        }

        .chain-stage:hover {
            border-color: var(--color-neutral-400);
        }

        .chain-stage.active {
            border-color: var(--color-neutral-700);
            background: var(--color-neutral-200);
        }

        .chain-stage.completed {
            border-color: var(--color-neutral-700);
            background: var(--color-neutral-700);
            color: white;
        }

        .chain-arrow {
            font-size: 1.5rem;
            color: var(--color-neutral-400);
            flex-shrink: 0;
        }

        .stage-name {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .stage-assessment {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .stage-assessment.active {
            display: block;
        }

        .stage-header {
            margin-bottom: 1.5rem;
        }

        .stage-header h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .stage-header p {
            font-size: 0.9rem;
            color: var(--color-neutral-600);
        }

        .assessment-group {
            margin-bottom: 1.5rem;
        }

        .assessment-label {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        .option-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .option-btn {
            flex: 1;
            min-width: 100px;
            padding: 0.75rem;
            border: 1px solid var(--color-neutral-300);
            border-radius: 6px;
            background: var(--color-neutral-50);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-size: 0.85rem;
        }

        .option-btn:hover {
            border-color: var(--color-neutral-400);
            background: var(--color-neutral-100);
        }

        .option-btn.selected {
            border-color: var(--color-neutral-700);
            background: var(--color-neutral-700);
            color: white;
        }

        .option-btn:focus {
            outline: 2px solid var(--color-focus);
            outline-offset: 2px;
        }

        .stage-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--color-neutral-200);
        }

        .btn {
            background: var(--color-neutral-700);
            color: white;
            border: 1px solid var(--color-neutral-700);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--color-neutral-800);
        }

        .btn:disabled {
            background: var(--color-neutral-300);
            border-color: var(--color-neutral-300);
            cursor: not-allowed;
        }

        .btn:focus {
            outline: 2px solid var(--color-focus);
            outline-offset: 2px;
        }

        .btn-secondary {
            background: white;
            color: var(--color-neutral-700);
            border-color: var(--color-neutral-300);
        }

        .btn-secondary:hover {
            background: var(--color-neutral-50);
            border-color: var(--color-neutral-400);
        }

        .results-panel {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: none;
        }

        .results-panel.show {
            display: block;
        }

        .results-panel h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }

        .results-table th,
        .results-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--color-neutral-200);
            font-size: 0.9rem;
        }

        .results-table th {
            background: var(--color-neutral-100);
            font-weight: 600;
        }

        .match-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .match-badge.match {
            background: var(--color-neutral-200);
            color: var(--color-neutral-800);
        }

        .match-badge.differ {
            background: var(--color-neutral-100);
            color: var(--color-neutral-600);
        }

        .expert-note {
            background: var(--color-neutral-100);
            border-left: 3px solid var(--color-neutral-700);
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1.5rem;
        }

        .expert-note h4 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .expert-note p {
            font-size: 0.9rem;
            color: var(--color-neutral-700);
        }

        .score-display {
            text-align: center;
            padding: 1rem;
            background: var(--color-neutral-50);
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .score-number {
            font-size: 2rem;
            font-weight: 600;
        }

        .score-label {
            font-size: 0.9rem;
            color: var(--color-neutral-600);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .chain-flow {
                flex-direction: column;
            }

            .chain-arrow {
                transform: rotate(90deg);
            }

            .chain-stage {
                min-width: 100%;
            }

            .option-row {
                flex-direction: column;
            }

            .option-btn {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Value Chain Analyzer</h1>
            <p class="subtitle">Analyze integration vs. modularization decisions across industries</p>
        </header>

        <div class="industry-select">
            <label for="industry-dropdown">Select an Industry to Analyze:</label>
            <select id="industry-dropdown" onchange="selectIndustry(this.value)">
                <option value="">-- Choose an industry --</option>
                <option value="ev">Electric Vehicles</option>
                <option value="ai">AI / Cloud Computing</option>
                <option value="smartphones">Smartphones</option>
                <option value="fashion">Fast Fashion</option>
            </select>
        </div>

        <div class="analysis-section" id="analysis-section">
            <div class="value-chain-visual">
                <h3 id="chain-title">Value Chain Stages</h3>
                <div class="chain-flow" id="chain-flow">
                    <!-- Stages will be inserted here -->
                </div>
            </div>

            <div id="stage-assessments">
                <!-- Stage assessment forms will be inserted here -->
            </div>
        </div>

        <div class="results-panel" id="results-panel">
            <h3>Analysis Results</h3>

            <div class="score-display">
                <div class="score-number" id="score-display">0/0</div>
                <div class="score-label">Assessments matching expert analysis</div>
            </div>

            <table class="results-table">
                <thead>
                    <tr>
                        <th>Stage</th>
                        <th>Your View</th>
                        <th>Expert View</th>
                        <th>Match</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                </tbody>
            </table>

            <div class="expert-note">
                <h4>Strategic Implications</h4>
                <p id="strategic-insight"></p>
            </div>

            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="resetAnalysis()">Analyze Another Industry</button>
            </div>
        </div>
    </div>

    <script>
        const industryData = {
            ev: {
                name: "Electric Vehicles",
                stages: [
                    { id: "battery-cells", name: "Battery Cells", description: "Raw materials and cell manufacturing" },
                    { id: "battery-packs", name: "Battery Packs", description: "Cell assembly and thermal management" },
                    { id: "motors", name: "Motors/Drivetrain", description: "Electric motors and power electronics" },
                    { id: "software", name: "Software", description: "Vehicle OS, OTA updates, autonomous features" },
                    { id: "assembly", name: "Final Assembly", description: "Vehicle manufacturing and quality control" }
                ],
                expert: {
                    "battery-cells": { state: "transitioning", driver: "performance", trend: "integration" },
                    "battery-packs": { state: "integrated", driver: "performance", trend: "stable" },
                    "motors": { state: "integrated", driver: "performance", trend: "stable" },
                    "software": { state: "integrated", driver: "performance", trend: "integration" },
                    "assembly": { state: "integrated", driver: "price", trend: "stable" }
                },
                insight: "The EV industry is highly integrated compared to traditional auto. Battery technology drives this—cells, packs, motors, and software must be optimized together for range and efficiency. Companies that control cell chemistry and manufacturing (Tesla, BYD) have significant advantages. Software integration is critical because OTA updates and autonomous features require deep hardware-software coordination. This is more like early Ford than modern Toyota's modular approach."
            },
            ai: {
                name: "AI / Cloud Computing",
                stages: [
                    { id: "chips", name: "AI Chips", description: "GPUs, TPUs, custom silicon" },
                    { id: "compute", name: "Compute Infrastructure", description: "Data centers, cooling, power" },
                    { id: "models", name: "Foundation Models", description: "LLMs, training, fine-tuning" },
                    { id: "platform", name: "Platform/APIs", description: "Developer tools, inference services" },
                    { id: "applications", name: "Applications", description: "End-user products and services" }
                ],
                expert: {
                    "chips": { state: "transitioning", driver: "performance", trend: "integration" },
                    "compute": { state: "integrated", driver: "power", trend: "integration" },
                    "models": { state: "modular", driver: "performance", trend: "stable" },
                    "platform": { state: "modular", driver: "price", trend: "stable" },
                    "applications": { state: "integrated", driver: "performance", trend: "integration" }
                },
                insight: "AI is driving rapid vertical integration. Google, Microsoft, and Amazon are building custom chips (TPUs, Trainium) to avoid Nvidia dependence (Power) and optimize for their workloads (Performance). Data center integration is about securing compute capacity and avoiding hold-up. Interestingly, foundation models remain somewhat modular (OpenAI, Anthropic, Google all viable), but applications are integrating—Google Search and Microsoft Office create end-user lock-in."
            },
            smartphones: {
                name: "Smartphones",
                stages: [
                    { id: "chips", name: "Chips/Processors", description: "SoC, modems, specialized silicon" },
                    { id: "displays", name: "Displays", description: "OLED, touch, glass" },
                    { id: "cameras", name: "Camera Systems", description: "Sensors, lenses, image processing" },
                    { id: "software", name: "Operating System", description: "iOS, Android, apps ecosystem" },
                    { id: "assembly", name: "Assembly/Distribution", description: "Manufacturing, retail, support" }
                ],
                expert: {
                    "chips": { state: "transitioning", driver: "performance", trend: "integration" },
                    "displays": { state: "modular", driver: "price", trend: "stable" },
                    "cameras": { state: "transitioning", driver: "performance", trend: "integration" },
                    "software": { state: "integrated", driver: "performance", trend: "stable" },
                    "assembly": { state: "modular", driver: "price", trend: "stable" }
                },
                insight: "Apple exemplifies selective integration. They've integrated chips (A-series, M-series) and software for Performance—tight hardware-software optimization. Displays and assembly remain modular (Samsung, Foxconn) because Price efficiency dominates there. Camera integration is increasing as computational photography requires hardware-software coordination. The key insight: integrate where Performance matters, modularize where Price dominates."
            },
            fashion: {
                name: "Fast Fashion",
                stages: [
                    { id: "design", name: "Design", description: "Trend identification, product design" },
                    { id: "sourcing", name: "Sourcing", description: "Fabric and materials procurement" },
                    { id: "manufacturing", name: "Manufacturing", description: "Cutting, sewing, finishing" },
                    { id: "logistics", name: "Logistics", description: "Distribution, inventory management" },
                    { id: "retail", name: "Retail", description: "Stores, e-commerce, customer experience" }
                ],
                expert: {
                    "design": { state: "integrated", driver: "performance", trend: "stable" },
                    "sourcing": { state: "modular", driver: "price", trend: "stable" },
                    "manufacturing": { state: "modular", driver: "price", trend: "stable" },
                    "logistics": { state: "integrated", driver: "performance", trend: "integration" },
                    "retail": { state: "integrated", driver: "performance", trend: "stable" }
                },
                insight: "Fast fashion (Zara, H&M) shows a split integration strategy. Design is integrated because trend responsiveness is the Performance differentiator—Zara's designers must work closely with stores. Manufacturing is modular because Price dominates—labor arbitrage through global supply chains. Logistics is increasingly integrated because speed-to-shelf is critical for trend capture. Retail is integrated because customer experience and data drive the entire model."
            }
        };

        let selectedIndustry = null;
        let currentStage = 0;
        let userAssessments = {};

        function selectIndustry(industry) {
            if (!industry) {
                document.getElementById('analysis-section').classList.remove('active');
                document.getElementById('results-panel').classList.remove('show');
                return;
            }

            selectedIndustry = industry;
            currentStage = 0;
            userAssessments = {};
            const data = industryData[industry];

            // Build chain flow
            document.getElementById('chain-title').textContent = `${data.name} Value Chain`;
            const chainFlow = document.getElementById('chain-flow');
            chainFlow.innerHTML = '';

            data.stages.forEach((stage, index) => {
                if (index > 0) {
                    const arrow = document.createElement('span');
                    arrow.className = 'chain-arrow';
                    arrow.textContent = '→';
                    arrow.setAttribute('aria-hidden', 'true');
                    chainFlow.appendChild(arrow);
                }

                const stageEl = document.createElement('div');
                stageEl.className = 'chain-stage' + (index === 0 ? ' active' : '');
                stageEl.dataset.stageId = stage.id;
                stageEl.innerHTML = `<span class="stage-name">${stage.name}</span>`;
                stageEl.onclick = () => goToStage(index);
                chainFlow.appendChild(stageEl);
            });

            // Build assessment forms
            buildAssessmentForms(data);

            // Show analysis section
            document.getElementById('analysis-section').classList.add('active');
            document.getElementById('results-panel').classList.remove('show');
        }

        function buildAssessmentForms(data) {
            const container = document.getElementById('stage-assessments');
            container.innerHTML = '';

            data.stages.forEach((stage, index) => {
                const form = document.createElement('div');
                form.className = 'stage-assessment' + (index === 0 ? ' active' : '');
                form.dataset.stageIndex = index;
                form.innerHTML = `
                    <div class="stage-header">
                        <h4>Stage ${index + 1}: ${stage.name}</h4>
                        <p>${stage.description}</p>
                    </div>

                    <div class="assessment-group">
                        <span class="assessment-label">Current State:</span>
                        <div class="option-row">
                            <button class="option-btn" onclick="selectOption('${stage.id}', 'state', 'integrated')" data-field="state" data-value="integrated">Integrated</button>
                            <button class="option-btn" onclick="selectOption('${stage.id}', 'state', 'modular')" data-field="state" data-value="modular">Modular</button>
                            <button class="option-btn" onclick="selectOption('${stage.id}', 'state', 'transitioning')" data-field="state" data-value="transitioning">Transitioning</button>
                        </div>
                    </div>

                    <div class="assessment-group">
                        <span class="assessment-label">Primary Driver:</span>
                        <div class="option-row">
                            <button class="option-btn" onclick="selectOption('${stage.id}', 'driver', 'price')" data-field="driver" data-value="price">Price</button>
                            <button class="option-btn" onclick="selectOption('${stage.id}', 'driver', 'power')" data-field="driver" data-value="power">Power</button>
                            <button class="option-btn" onclick="selectOption('${stage.id}', 'driver', 'performance')" data-field="driver" data-value="performance">Performance</button>
                        </div>
                    </div>

                    <div class="assessment-group">
                        <span class="assessment-label">Trend Direction:</span>
                        <div class="option-row">
                            <button class="option-btn" onclick="selectOption('${stage.id}', 'trend', 'integration')" data-field="trend" data-value="integration">Toward Integration</button>
                            <button class="option-btn" onclick="selectOption('${stage.id}', 'trend', 'modularization')" data-field="trend" data-value="modularization">Toward Modularization</button>
                            <button class="option-btn" onclick="selectOption('${stage.id}', 'trend', 'stable')" data-field="trend" data-value="stable">Stable</button>
                        </div>
                    </div>

                    <div class="stage-nav">
                        <button class="btn btn-secondary" onclick="prevStage()" ${index === 0 ? 'disabled' : ''}>Previous</button>
                        ${index < data.stages.length - 1
                            ? `<button class="btn" onclick="nextStage()" id="next-btn-${index}" disabled>Next Stage</button>`
                            : `<button class="btn" onclick="showResults()" id="complete-btn" disabled>View Results</button>`
                        }
                    </div>
                `;
                container.appendChild(form);
            });
        }

        function selectOption(stageId, field, value) {
            if (!userAssessments[stageId]) {
                userAssessments[stageId] = {};
            }
            userAssessments[stageId][field] = value;

            // Update button states
            const form = document.querySelector(`.stage-assessment[data-stage-index="${currentStage}"]`);
            const buttons = form.querySelectorAll(`.option-btn[data-field="${field}"]`);
            buttons.forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.value === value);
            });

            // Check if all fields are complete for this stage
            checkStageComplete(stageId);
        }

        function checkStageComplete(stageId) {
            const assessment = userAssessments[stageId];
            if (assessment && assessment.state && assessment.driver && assessment.trend) {
                const data = industryData[selectedIndustry];
                if (currentStage < data.stages.length - 1) {
                    document.getElementById(`next-btn-${currentStage}`).disabled = false;
                } else {
                    document.getElementById('complete-btn').disabled = false;
                }
            }
        }

        function goToStage(index) {
            const forms = document.querySelectorAll('.stage-assessment');
            const stages = document.querySelectorAll('.chain-stage');

            forms.forEach((form, i) => {
                form.classList.toggle('active', i === index);
            });

            stages.forEach((stage, i) => {
                stage.classList.remove('active');
                if (i < index || (i === index && userAssessments[stage.dataset.stageId]?.state)) {
                    stage.classList.add('completed');
                }
                if (i === index) {
                    stage.classList.add('active');
                    stage.classList.remove('completed');
                }
            });

            currentStage = index;
        }

        function nextStage() {
            const data = industryData[selectedIndustry];
            if (currentStage < data.stages.length - 1) {
                goToStage(currentStage + 1);
            }
        }

        function prevStage() {
            if (currentStage > 0) {
                goToStage(currentStage - 1);
            }
        }

        function showResults() {
            const data = industryData[selectedIndustry];
            const resultsBody = document.getElementById('results-body');
            resultsBody.innerHTML = '';

            let matches = 0;
            let total = 0;

            const labels = {
                state: { integrated: 'Integrated', modular: 'Modular', transitioning: 'Transitioning' },
                driver: { price: 'Price', power: 'Power', performance: 'Performance' },
                trend: { integration: 'Toward Integration', modularization: 'Toward Modularization', stable: 'Stable' }
            };

            data.stages.forEach(stage => {
                const user = userAssessments[stage.id];
                const expert = data.expert[stage.id];

                ['state', 'driver', 'trend'].forEach(field => {
                    total++;
                    const isMatch = user[field] === expert[field];
                    if (isMatch) matches++;

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${stage.name} - ${field.charAt(0).toUpperCase() + field.slice(1)}</td>
                        <td>${labels[field][user[field]]}</td>
                        <td>${labels[field][expert[field]]}</td>
                        <td><span class="match-badge ${isMatch ? 'match' : 'differ'}">${isMatch ? 'Match' : 'Differs'}</span></td>
                    `;
                    resultsBody.appendChild(row);
                });
            });

            document.getElementById('score-display').textContent = `${matches}/${total}`;
            document.getElementById('strategic-insight').textContent = data.insight;

            document.getElementById('results-panel').classList.add('show');
            document.getElementById('results-panel').scrollIntoView({ behavior: 'smooth' });
        }

        function resetAnalysis() {
            document.getElementById('industry-dropdown').value = '';
            document.getElementById('analysis-section').classList.remove('active');
            document.getElementById('results-panel').classList.remove('show');
            selectedIndustry = null;
            currentStage = 0;
            userAssessments = {};
        }
    </script>
</body>
</html>
