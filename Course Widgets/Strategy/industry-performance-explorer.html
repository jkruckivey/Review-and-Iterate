<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industry Performance Explorer - Strategy Course Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Neutral Palette (Grays) */
            --color-neutral-50: #fafafa;
            --color-neutral-100: #f5f5f5;
            --color-neutral-200: #e5e5e5;
            --color-neutral-300: #d4d4d4;
            --color-neutral-400: #a3a3a3;
            --color-neutral-500: #737373;
            --color-neutral-600: #525252;
            --color-neutral-700: #404040;
            --color-neutral-800: #262626;
            --color-neutral-900: #171717;

            /* Semantic Colors */
            --color-success: #22c55e;
            --color-success-light: #dcfce7;
            --color-success-dark: #15803d;
            --color-error: #ef4444;
            --color-error-light: #fee2e2;
            --color-error-dark: #b91c1c;
            --color-warning: #f59e0b;
            --color-warning-light: #fcd34d;
            --color-warning-dark: #d97706;
            --color-info: #3b82f6;
            --color-info-light: #93c5fd;
            --color-info-dark: #1d4ed8;

            /* Knowledge Check Feedback (Subtle) */
            --color-correct: #c0d1cd;
            --color-correct-bg: #f0f5f4;
            --color-incorrect: #f0ede0;
            --color-incorrect-bg: #faf9f5;

            /* Accent Colors */
            --color-accent: #bfe5e7;
            --color-accent-dark: #5a9ea1;

            /* 3 Elements */
            --color-element-sage: #c0d1cd;
            --color-element-purple: #d5cae0;
            --color-element-blue: #bfe5e7;

            /* Focus state */
            --color-focus: #3182ce;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: white;
            color: var(--color-neutral-900);
            line-height: 1.6;
            padding: 2rem;
        }
        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--color-neutral-900);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--color-neutral-600);
            margin-bottom: 1.5rem;
        }

        .controls-section {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--color-neutral-900);
        }

        select {
            padding: 0.625rem;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--color-neutral-900);
            background: white;
            cursor: pointer;
        }

        select:focus {
            outline: 2px solid var(--color-focus);
            outline-offset: 2px;
        }

        .chart-section {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--color-neutral-900);
        }

        .chart-container {
            width: 100%;
            overflow-x: auto;
        }

        .bar-chart {
            min-width: 600px;
            margin: 2rem 0;
        }

        .bar-item {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .bar-label {
            width: 180px;
            font-size: 0.9rem;
            color: var(--color-neutral-800);
            font-weight: 500;
            text-align: right;
        }

        .bar-track {
            flex: 1;
            height: 32px;
            background: var(--color-neutral-100);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--color-neutral-700);
            border-radius: 4px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 0.5rem;
        }

        .bar-value {
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .bar-value-outside {
            width: 60px;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-neutral-800);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }

        .data-table th {
            background: var(--color-neutral-100);
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--color-neutral-900);
            border-bottom: 2px solid var(--color-neutral-300);
        }

        .data-table td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--color-neutral-200);
            font-size: 0.9rem;
            color: var(--color-neutral-700);
        }

        .data-table tr:hover {
            background: var(--color-neutral-50);
        }

        .data-table th.sortable {
            cursor: pointer;
            user-select: none;
        }

        .data-table th.sortable:hover {
            background: var(--color-neutral-200);
        }

        .sort-icon {
            margin-left: 0.25rem;
            font-size: 0.7rem;
            color: var(--color-neutral-500);
        }

        .insight-box {
            background: var(--color-neutral-100);
            border-left: 3px solid var(--color-neutral-700);
            padding: 1.25rem;
            border-radius: 4px;
            margin-top: 2rem;
        }

        .insight-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.75rem;
            color: var(--color-neutral-900);
        }

        .insight-text {
            font-size: 0.95rem;
            color: var(--color-neutral-700);
            line-height: 1.6;
        }

        .legend {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            padding: 1rem;
            background: var(--color-neutral-50);
            border-radius: 4px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--color-neutral-700);
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }

            .bar-label {
                width: 120px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Industry Performance Explorer</h1>
            <p class="subtitle">Explore how industry structure affects profitability across different sectors</p>
        </header>

        <div class="controls-section">
            <div class="controls-grid">
                <div class="control-group">
                    <label class="control-label" for="metric-select">Performance Metric</label>
                    <select id="metric-select" onchange="updateChart()">
                        <option value="roa">Return on Assets (ROA)</option>
                        <option value="tobinq">Tobin's Q</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label" for="year-select">Time Period</label>
                    <select id="year-select" onchange="updateChart()">
                        <option value="2010">2010 Data</option>
                        <option value="1980">1980 Data</option>
                        <option value="both">Compare 1980 vs 2010</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label" for="sort-select">Sort By</label>
                    <select id="sort-select" onchange="updateChart()">
                        <option value="performance-desc">Highest Performance First</option>
                        <option value="performance-asc">Lowest Performance First</option>
                        <option value="name-asc">Industry Name (A-Z)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="chart-section">
            <h2 class="chart-title" id="chart-title">Industry Performance by ROA (2010)</h2>
            <div class="chart-container">
                <div class="bar-chart" id="bar-chart">
                    <!-- Bars will be inserted here -->
                </div>
            </div>

            <div class="legend" id="legend" style="display: none;">
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--color-neutral-700);"></div>
                    <span>2010 Data</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--color-neutral-400);"></div>
                    <span>1980 Data</span>
                </div>
            </div>
        </div>

        <div class="chart-section">
            <h2 class="chart-title">Detailed Industry Data</h2>
            <div class="chart-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="sortable" onclick="sortTable('name')">Industry <span class="sort-icon">▼</span></th>
                            <th class="sortable" onclick="sortTable('roa2010')">ROA 2010 <span class="sort-icon">▼</span></th>
                            <th class="sortable" onclick="sortTable('roa1980')">ROA 1980 <span class="sort-icon">▼</span></th>
                            <th class="sortable" onclick="sortTable('tobinq2010')">Tobin's Q 2010 <span class="sort-icon">▼</span></th>
                            <th class="sortable" onclick="sortTable('tobinq1980')">Tobin's Q 1980 <span class="sort-icon">▼</span></th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body">
                        <!-- Rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="insight-box">
            <div class="insight-title">Key Insight: Industry Structure Matters</div>
            <div class="insight-text" id="insight-text">
                <!-- Insight will be updated based on selections -->
            </div>
        </div>
    </div>

    <script>
        // Industry performance data (simulated based on research patterns)
        const industries = [
            { name: 'Pharmaceuticals', roa1980: 12.5, roa2010: 14.2, tobinq1980: 2.8, tobinq2010: 3.2 },
            { name: 'Software & IT Services', roa1980: 8.3, roa2010: 15.8, tobinq1980: 1.9, tobinq2010: 4.1 },
            { name: 'Medical Devices', roa1980: 10.2, roa2010: 11.5, tobinq1980: 2.3, tobinq2010: 2.9 },
            { name: 'Oil & Gas', roa1980: 11.8, roa2010: 9.2, tobinq1980: 1.7, tobinq2010: 1.4 },
            { name: 'Banking & Financial Services', roa1980: 0.9, roa2010: 0.8, tobinq1980: 1.05, tobinq2010: 1.03 },
            { name: 'Airlines', roa1980: 2.1, roa2010: 1.5, tobinq1980: 0.95, tobinq2010: 0.92 },
            { name: 'Automotive Manufacturing', roa1980: 3.8, roa2010: 2.9, tobinq1980: 1.1, tobinq2010: 1.15 },
            { name: 'Retail - General Merchandise', roa1980: 5.2, roa2010: 4.8, tobinq1980: 1.4, tobinq2010: 1.3 },
            { name: 'Telecommunications', roa1980: 7.5, roa2010: 6.2, tobinq1980: 1.8, tobinq2010: 1.6 },
            { name: 'Restaurants & Food Service', roa1980: 6.8, roa2010: 7.5, tobinq1980: 1.5, tobinq2010: 1.7 },
            { name: 'Hotels & Hospitality', roa1980: 4.5, roa2010: 3.2, tobinq1980: 1.2, tobinq2010: 1.1 },
            { name: 'Construction & Engineering', roa1980: 5.1, roa2010: 4.3, tobinq1980: 1.3, tobinq2010: 1.2 }
        ];

        function updateChart() {
            const metric = document.getElementById('metric-select').value;
            const year = document.getElementById('year-select').value;
            const sortBy = document.getElementById('sort-select').value;

            // Update chart title
            const metricName = metric === 'roa' ? 'Return on Assets (ROA)' : "Tobin's Q";
            const yearName = year === 'both' ? '1980 vs 2010' : year;
            document.getElementById('chart-title').textContent = `Industry Performance by ${metricName} (${yearName})`;

            // Sort industries
            let sorted = [...industries];
            if (sortBy === 'performance-desc') {
                sorted.sort((a, b) => {
                    const metricKey = metric + '2010';
                    return b[metricKey] - a[metricKey];
                });
            } else if (sortBy === 'performance-asc') {
                sorted.sort((a, b) => {
                    const metricKey = metric + '2010';
                    return a[metricKey] - b[metricKey];
                });
            } else {
                sorted.sort((a, b) => a.name.localeCompare(b.name));
            }

            // Calculate max value for scaling
            const metricKey2010 = metric + '2010';
            const metricKey1980 = metric + '1980';
            const maxValue = Math.max(...sorted.map(i => Math.max(i[metricKey2010], i[metricKey1980])));

            // Render bars
            const barChart = document.getElementById('bar-chart');
            barChart.innerHTML = '';

            sorted.forEach(industry => {
                const value2010 = industry[metricKey2010];
                const value1980 = industry[metricKey1980];

                if (year === 'both') {
                    // Show both bars
                    const item = document.createElement('div');
                    item.style.marginBottom = '1.5rem';

                    item.innerHTML = `
                        <div style="font-weight: 600; margin-bottom: 0.5rem; color: var(--color-neutral-800);">${industry.name}</div>
                        <div class="bar-item">
                            <div class="bar-label" style="width: 80px; font-size: 0.8rem;">2010</div>
                            <div class="bar-track">
                                <div class="bar-fill" style="width: ${(value2010 / maxValue) * 100}%; background: var(--color-neutral-700);">
                                    ${(value2010 / maxValue) * 100 > 15 ? `<span class="bar-value">${value2010.toFixed(1)}${metric === 'roa' ? '%' : ''}</span>` : ''}
                                </div>
                            </div>
                            <div class="bar-value-outside">${(value2010 / maxValue) * 100 <= 15 ? value2010.toFixed(1) + (metric === 'roa' ? '%' : '') : ''}</div>
                        </div>
                        <div class="bar-item">
                            <div class="bar-label" style="width: 80px; font-size: 0.8rem;">1980</div>
                            <div class="bar-track">
                                <div class="bar-fill" style="width: ${(value1980 / maxValue) * 100}%; background: var(--color-neutral-400);">
                                    ${(value1980 / maxValue) * 100 > 15 ? `<span class="bar-value">${value1980.toFixed(1)}${metric === 'roa' ? '%' : ''}</span>` : ''}
                                </div>
                            </div>
                            <div class="bar-value-outside">${(value1980 / maxValue) * 100 <= 15 ? value1980.toFixed(1) + (metric === 'roa' ? '%' : '') : ''}</div>
                        </div>
                    `;
                    barChart.appendChild(item);
                } else {
                    // Show single year
                    const value = year === '2010' ? value2010 : value1980;
                    const item = document.createElement('div');
                    item.className = 'bar-item';

                    item.innerHTML = `
                        <div class="bar-label">${industry.name}</div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${(value / maxValue) * 100}%;">
                                ${(value / maxValue) * 100 > 15 ? `<span class="bar-value">${value.toFixed(1)}${metric === 'roa' ? '%' : ''}</span>` : ''}
                            </div>
                        </div>
                        <div class="bar-value-outside">${(value / maxValue) * 100 <= 15 ? value.toFixed(1) + (metric === 'roa' ? '%' : '') : ''}</div>
                    `;
                    barChart.appendChild(item);
                }
            });

            // Show/hide legend
            document.getElementById('legend').style.display = year === 'both' ? 'flex' : 'none';

            // Update insight
            updateInsight(metric, year, sorted);

            // Update table
            updateTable();
        }

        function updateInsight(metric, year, sortedData) {
            const insightText = document.getElementById('insight-text');
            const metricName = metric === 'roa' ? 'ROA' : "Tobin's Q";
            const metricKey = metric + '2010';

            const highest = sortedData.reduce((max, i) => i[metricKey] > max[metricKey] ? i : max);
            const lowest = sortedData.reduce((min, i) => i[metricKey] < min[metricKey] ? i : min);
            const range = highest[metricKey] - lowest[metricKey];
            const avgValue = sortedData.reduce((sum, i) => sum + i[metricKey], 0) / sortedData.length;

            let insight = '';

            if (year === 'both') {
                insight = `Comparing 1980 to 2010, you can see how industry performance evolves over time. Some industries (like <strong>Software & IT Services</strong>) have dramatically improved, while others (like <strong>Oil & Gas</strong>) have declined. This demonstrates that industry attractiveness is not static - competitive forces change over decades. However, the fundamental principle remains: industry structure significantly constrains performance potential.`;
            } else {
                insight = `In ${year}, <strong>${highest.name}</strong> had the highest ${metricName} at ${highest[metricKey].toFixed(1)}${metric === 'roa' ? '%' : ''}, while <strong>${lowest.name}</strong> had the lowest at ${lowest[metricKey].toFixed(1)}${metric === 'roa' ? '%' : ''}. This ${range.toFixed(1)}-point difference (${((range / avgValue) * 100).toFixed(0)}% variation) illustrates how industry structure creates different "mountains" to climb. Research shows that approximately <strong>20% of firm performance variation</strong> is explained by industry membership alone - more than strategic positioning within the industry.`;
            }

            insightText.innerHTML = insight;
        }

        function updateTable() {
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';

            industries.forEach(industry => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-weight: 600;">${industry.name}</td>
                    <td>${industry.roa2010.toFixed(1)}%</td>
                    <td>${industry.roa1980.toFixed(1)}%</td>
                    <td>${industry.tobinq2010.toFixed(2)}</td>
                    <td>${industry.tobinq1980.toFixed(2)}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function sortTable(column) {
            // Simple table sorting (would be enhanced in production)
            console.log('Sort by:', column);
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            updateChart();
        });
    </script>
</body>
</html>
