<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 2: Knowledge Check - Industry Forces</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Neutral Palette (Grays) */
            --color-neutral-50: #fafafa;
            --color-neutral-100: #f5f5f5;
            --color-neutral-200: #e5e5e5;
            --color-neutral-300: #d4d4d4;
            --color-neutral-400: #a3a3a3;
            --color-neutral-500: #737373;
            --color-neutral-600: #525252;
            --color-neutral-700: #404040;
            --color-neutral-800: #262626;
            --color-neutral-900: #171717;

            /* Semantic Colors */
            --color-success: #22c55e;
            --color-success-light: #dcfce7;
            --color-success-dark: #15803d;
            --color-error: #ef4444;
            --color-error-light: #fee2e2;
            --color-error-dark: #b91c1c;
            --color-warning: #f59e0b;
            --color-warning-light: #fcd34d;
            --color-warning-dark: #d97706;
            --color-info: #3b82f6;
            --color-info-light: #93c5fd;
            --color-info-dark: #1d4ed8;

            /* Knowledge Check Feedback (Subtle) */
            --color-correct: #c0d1cd;
            --color-correct-bg: #f0f5f4;
            --color-incorrect: #f0ede0;
            --color-incorrect-bg: #faf9f5;

            /* Focus State */
            --color-focus: #3182ce;

            /* Accent Colors */
            --color-accent: #bfe5e7;
            --color-accent-dark: #5a9ea1;

            /* 3 Elements */
            --color-element-sage: #c0d1cd;
            --color-element-purple: #d5cae0;
            --color-element-blue: #bfe5e7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: white;
            color: var(--color-neutral-900);
            line-height: 1.6;
            padding: 2rem;
        }
        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--color-neutral-300);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--color-neutral-900);
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--color-neutral-600);
            margin-bottom: 1rem;
        }

        .progress-bar {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .progress-label {
            font-size: 0.9rem;
            color: var(--color-neutral-600);
        }

        .progress-fill-container {
            flex: 1;
            margin: 0 1rem;
            height: 8px;
            background: var(--color-neutral-200);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--color-accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-card {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .question-number {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--color-neutral-500);
            margin-bottom: 0.75rem;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--color-neutral-900);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .choice {
            background: var(--color-neutral-50);
            border: 1px solid var(--color-neutral-300);
            border-radius: 6px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .choice:hover:not(.disabled) {
            border-color: var(--color-neutral-400);
            background: white;
        }

        .choice.selected {
            border-color: var(--color-neutral-700);
            background: white;
        }

        .choice.correct {
            border-color: var(--color-correct);
            background: var(--color-correct-bg);
        }

        .choice.incorrect {
            border-color: var(--color-incorrect);
            background: var(--color-incorrect-bg);
            opacity: 0.7;
        }

        .choice.disabled {
            cursor: not-allowed;
        }

        .choice-letter {
            font-weight: 600;
            color: var(--color-neutral-700);
            flex-shrink: 0;
        }

        .choice-text {
            font-size: 0.95rem;
            color: var(--color-neutral-900);
            flex: 1;
        }

        .feedback {
            background: var(--color-neutral-100);
            border: 1px solid var(--color-neutral-300);
            border-radius: 6px;
            padding: 1.25rem;
            margin-top: 1.5rem;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback-header {
            font-weight: 600;
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }

        .feedback-header.correct {
            color: var(--color-neutral-900);
        }

        .feedback-header.incorrect {
            color: var(--color-neutral-700);
        }

        .feedback-text {
            font-size: 0.95rem;
            color: var(--color-neutral-700);
            line-height: 1.6;
        }

        .navigation {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn {
            background: var(--color-neutral-700);
            color: white;
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--color-neutral-700);
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Geist', sans-serif;
        }

        .btn:hover:not(:disabled) {
            background: var(--color-neutral-800);
            border-color: var(--color-neutral-800);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: var(--color-neutral-700);
            border: 1px solid var(--color-neutral-300);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--color-neutral-50);
            border-color: var(--color-neutral-400);
        }

        .results-card {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            display: none;
        }

        .results-card.show {
            display: block;
        }

        .results-score {
            font-size: 3rem;
            font-weight: 600;
            color: var(--color-neutral-900);
            margin-bottom: 0.5rem;
        }

        .results-label {
            font-size: 1.1rem;
            color: var(--color-neutral-600);
            margin-bottom: 1.5rem;
        }

        .results-message {
            font-size: 1rem;
            color: var(--color-neutral-700);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .results-breakdown {
            background: var(--color-neutral-50);
            border: 1px solid var(--color-neutral-300);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--color-neutral-200);
            font-size: 0.95rem;
        }

        .breakdown-item:last-child {
            border-bottom: none;
        }

        .breakdown-label {
            color: var(--color-neutral-700);
        }

        .breakdown-value {
            font-weight: 600;
            color: var(--color-neutral-900);
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .question-card {
                padding: 1.5rem;
            }

            .navigation {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Part 2: Knowledge Check</h1>
            <p class="subtitle">Industry Forces & Strategic Analysis</p>
            <p class="subtitle" style="font-size: 0.85rem; margin-top: 0.5rem;">Self-assessment quiz • 5 questions • ~5-7 minutes</p>
        </header>


        <div class="progress-bar">
            <span class="progress-label">Progress:</span>
            <div class="progress-fill-container">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="progress-label" id="progress-text">0/5</span>
        </div>

        <div id="quiz-container"></div>

        <div class="navigation" id="nav-buttons" style="display: none;">
            <button class="btn btn-secondary" id="prev-btn" onclick="previousQuestion()">Previous</button>
            <button class="btn" id="next-btn" onclick="nextQuestion()">Next Question</button>
        </div>

        <div class="results-card" id="results-card">
            <div class="results-score" id="final-score">0/5</div>
            <div class="results-label">Questions Correct</div>
            <div class="results-message" id="results-message"></div>

            <div class="results-breakdown">
                <div class="breakdown-item">
                    <span class="breakdown-label">Correct Answers</span>
                    <span class="breakdown-value" id="correct-count">0</span>
                </div>
                <div class="breakdown-item">
                    <span class="breakdown-label">Incorrect Answers</span>
                    <span class="breakdown-value" id="incorrect-count">0</span>
                </div>
                <div class="breakdown-item">
                    <span class="breakdown-label">Percentage</span>
                    <span class="breakdown-value" id="percentage">0%</span>
                </div>
            </div>

            <div class="navigation">
                <button class="btn btn-secondary" onclick="reviewAnswers()">Review Answers</button>
                <button class="btn" onclick="restartQuiz()">Retake Quiz</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                text: "Which of the following statements BEST describes the primary insight of Porter's Five Forces framework?",
                choices: [
                    {
                        letter: "A",
                        text: "Industry profitability depends primarily on the competitive actions of direct rivals.",
                        correct: false,
                        feedback: "While rivalry matters, this is too narrow. The Five Forces framework shows that profitability is determined by ALL five forces, not just direct competitors. Suppliers, buyers, substitutes, and new entrants all constrain profitability."
                    },
                    {
                        letter: "B",
                        text: "Industry structure determines the intensity of competitive forces, which in turn shapes average profitability.",
                        correct: true,
                        feedback: "Correct! Porter's key insight is that industry STRUCTURE (concentration, barriers to entry, product differentiation, etc.) determines how strong each competitive force is, and collectively these forces determine the 'height of the mountain to climb' - i.e., how profitable firms in that industry can be on average."
                    },
                    {
                        letter: "C",
                        text: "Companies should always seek to enter industries with weak competitive forces to maximize profits.",
                        correct: false,
                        feedback: "This misses a critical point: industry attractiveness is just the starting point. A company also needs to achieve a defensible competitive position WITHIN that industry. Sometimes a strong firm in a tough industry outperforms a weak firm in an attractive industry."
                    },
                    {
                        letter: "D",
                        text: "The most important force is always the bargaining power of buyers, since they ultimately pay for products.",
                        correct: false,
                        feedback: "No single force is universally most important - it varies by industry. In pharmaceuticals, buyer power is relatively weak (patients need medicines). In retail groceries, buyer power (Walmart, Costco) is very strong. The framework requires analyzing ALL five forces."
                    }
                ]
            },
            {
                id: 2,
                text: "The data showing that approximately 20% of firm profitability variation is explained by industry membership suggests:",
                choices: [
                    {
                        letter: "A",
                        text: "Industry forces are relatively unimportant compared to firm-specific factors like strategy and execution.",
                        correct: false,
                        feedback: "While it's true that firm-specific factors explain MORE variance (about 45%), saying industry forces are 'relatively unimportant' is wrong. 20% is a substantial and CONSISTENT effect - choosing the right industry matters significantly for setting realistic goals."
                    },
                    {
                        letter: "B",
                        text: "Industry structure creates a consistent 'starting point' that firms must work with, though firm strategy also matters greatly.",
                        correct: true,
                        feedback: "Exactly! Industry explains ~20% (structural constraints), firm effects explain ~45% (strategic choices), and the rest is unexplained variance. This means industry sets the 'mountain to climb' but strategy determines how well you climb it. Both matter - industry analysis helps set realistic goals given structural constraints."
                    },
                    {
                        letter: "C",
                        text: "Since 80% of variance is NOT explained by industry, managers should ignore industry analysis entirely.",
                        correct: false,
                        feedback: "This is flawed logic. Just because industry doesn't explain MOST variance doesn't mean it's irrelevant. 20% is a significant, consistent effect. Ignoring it means setting unrealistic goals (e.g., expecting pharmaceutical-level margins in the airline industry)."
                    },
                    {
                        letter: "D",
                        text: "The remaining 80% of variance is entirely due to firm-specific strategic choices.",
                        correct: false,
                        feedback: "Not quite - firm effects explain about 45% of variance, not 80%. The rest (~35%) is unexplained variance including measurement error, random factors, and business unit effects. So it's industry (~20%) + firm (~45%) + other (~35%)."
                    }
                ]
            },
            {
                id: 3,
                text: "A medical device company is analyzing the threat of new entrants. Which of the following factors would MOST effectively serve as a barrier to entry?",
                choices: [
                    {
                        letter: "A",
                        text: "The industry has experienced strong growth over the past five years.",
                        correct: false,
                        feedback: "Strong growth actually ATTRACTS new entrants rather than deterring them - it signals profit opportunities. Barriers to entry are factors that make it DIFFICULT or COSTLY for new competitors to enter, not factors that make entry attractive."
                    },
                    {
                        letter: "B",
                        text: "Existing firms have strong brand loyalty and regulatory approvals (FDA clearance) that take years to obtain.",
                        correct: true,
                        feedback: "Correct! These are classic entry barriers. Brand loyalty creates customer switching costs, and regulatory requirements (especially FDA approval) create significant time and cost barriers. A new entrant would need to invest years and millions of dollars before making a single sale."
                    },
                    {
                        letter: "C",
                        text: "The largest competitor recently announced plans to expand internationally.",
                        correct: false,
                        feedback: "A competitor's expansion plans don't directly create barriers for NEW entrants to the domestic market. If anything, if the incumbent is distracted by international expansion, that might create an opportunity for a nimble new entrant."
                    },
                    {
                        letter: "D",
                        text: "Industry profit margins have been declining due to increased rivalry.",
                        correct: false,
                        feedback: "Declining margins might DISCOURAGE entry (lower attractiveness), but that's different from a BARRIER to entry. Barriers are structural factors that make entry difficult even if you wanted to enter. Low margins reduce motivation, but don't necessarily make entry harder."
                    }
                ]
            },
            {
                id: 4,
                text: "In which scenario is the bargaining power of SUPPLIERS strongest?",
                choices: [
                    {
                        letter: "A",
                        text: "A smartphone manufacturer buys generic commodity components (resistors, capacitors) from many small suppliers worldwide.",
                        correct: false,
                        feedback: "Supplier power is WEAK here. Many suppliers + commodity products = low switching costs for the buyer. The smartphone company can easily switch suppliers or play them against each other to negotiate lower prices."
                    },
                    {
                        letter: "B",
                        text: "A car manufacturer relies on a specialized AI chip available from only two suppliers, and switching would require 18 months of re-engineering.",
                        correct: true,
                        feedback: "Correct! Supplier power is STRONGEST when: (1) few alternative suppliers exist (oligopoly/monopoly), (2) the input is differentiated/specialized (not commodity), (3) switching costs are high. All three factors apply here, giving suppliers significant pricing power."
                    },
                    {
                        letter: "C",
                        text: "A restaurant buys fresh produce from local farmers, and the farmers have no other buyers in the area.",
                        correct: false,
                        feedback: "Supplier power is actually WEAK here despite the local monopoly on fresh produce. The farmers are dependent on the restaurant (no alternative buyers), which means the BUYER has power, not the supplier. Supplier power requires suppliers to have alternatives while buyers don't."
                    },
                    {
                        letter: "D",
                        text: "A clothing retailer purchases finished garments from manufacturers in multiple countries with excess production capacity.",
                        correct: false,
                        feedback: "Supplier power is WEAK. Excess capacity means suppliers are competing for orders, and multiple countries means many alternatives. The retailer can easily switch suppliers or negotiate hard, knowing suppliers need the volume."
                    }
                ]
            },
            {
                id: 5,
                text: "How does understanding industry attractiveness (via Five Forces analysis) help with goal-setting?",
                choices: [
                    {
                        letter: "A",
                        text: "It tells you exactly what ROA your company should target to beat competitors.",
                        correct: false,
                        feedback: "Five Forces analysis reveals INDUSTRY AVERAGE profitability constraints, not firm-specific targets. Your firm's goal depends on both industry structure AND your competitive position within the industry. Two firms in the same industry can have very different realistic goals."
                    },
                    {
                        letter: "B",
                        text: "It helps you avoid setting implausible goals by showing the structural constraints on profitability in your industry.",
                        correct: true,
                        feedback: "Exactly! Five Forces shows the 'height of the mountain to climb' - the structural factors that constrain industry profitability. If you're in airlines (strong buyer power, low barriers to entry, intense rivalry), expecting pharmaceutical-level margins is implausible. Industry analysis grounds your goals in reality."
                    },
                    {
                        letter: "C",
                        text: "It proves that goal-setting is pointless because industry structure determines everything.",
                        correct: false,
                        feedback: "This is too deterministic. Industry explains ~20% of profit variance, but firm strategy explains ~45%. Industry analysis helps set REALISTIC goals given structural constraints, but there's still significant room for strategic choice to outperform industry averages."
                    },
                    {
                        letter: "D",
                        text: "It shows which industries to avoid entirely, since unattractive industries always destroy shareholder value.",
                        correct: false,
                        feedback: "This oversimplifies. Even in 'unattractive' industries (e.g., airlines), some firms (Southwest, Ryanair) create value through superior positioning. Industry attractiveness is just the starting point - competitive advantage within the industry also matters greatly."
                    }
                ]
            }
        ];

        let currentQuestionIndex = 0;
        let userAnswers = [];
        let quizCompleted = false;

        function initQuiz() {
            renderQuestion();
            updateProgress();
        }

        function renderQuestion() {
            const question = questions[currentQuestionIndex];
            const container = document.getElementById('quiz-container');

            const choicesHTML = question.choices.map(choice => `
                <div class="choice ${isChoiceSelected(choice.letter) ? 'selected' : ''} ${getChoiceClass(choice.letter)}"
                     onclick="selectChoice('${choice.letter}')"
                     data-letter="${choice.letter}">
                    <div class="choice-letter">${choice.letter}</div>
                    <div class="choice-text">${choice.text}</div>
                </div>
            `).join('');

            const feedbackHTML = getFeedback();

            container.innerHTML = `
                <div class="question-card">
                    <div class="question-number">Question ${currentQuestionIndex + 1} of ${questions.length}</div>
                    <div class="question-text">${question.text}</div>
                    <div class="choices">
                        ${choicesHTML}
                    </div>
                    ${feedbackHTML}
                </div>
            `;

            document.getElementById('nav-buttons').style.display = 'flex';
            updateNavigationButtons();
        }

        function isChoiceSelected(letter) {
            if (!userAnswers[currentQuestionIndex]) return false;
            return userAnswers[currentQuestionIndex].selected === letter;
        }

        function getChoiceClass(letter) {
            const answer = userAnswers[currentQuestionIndex];
            if (!answer || !answer.submitted) return '';

            const question = questions[currentQuestionIndex];
            const choice = question.choices.find(c => c.letter === letter);

            if (choice.correct) return 'correct';
            if (answer.selected === letter) return 'incorrect';
            return 'disabled';
        }

        function getFeedback() {
            const answer = userAnswers[currentQuestionIndex];
            if (!answer || !answer.submitted) return '';

            const question = questions[currentQuestionIndex];
            const selectedChoice = question.choices.find(c => c.letter === answer.selected);

            const isCorrect = selectedChoice.correct;
            const headerClass = isCorrect ? 'correct' : 'incorrect';
            const headerText = isCorrect ? '✓ Correct!' : '✗ Incorrect';

            return `
                <div class="feedback show">
                    <div class="feedback-header ${headerClass}">${headerText}</div>
                    <div class="feedback-text">${selectedChoice.feedback}</div>
                </div>
            `;
        }

        function selectChoice(letter) {
            const answer = userAnswers[currentQuestionIndex];
            if (answer && answer.submitted) return; // Already submitted

            userAnswers[currentQuestionIndex] = {
                selected: letter,
                submitted: true
            };

            renderQuestion();
            updateProgress();
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function updateNavigationButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            prevBtn.disabled = currentQuestionIndex === 0;

            const answer = userAnswers[currentQuestionIndex];
            nextBtn.disabled = !answer || !answer.submitted;

            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.textContent = 'View Results';
            } else {
                nextBtn.textContent = 'Next Question';
            }
        }

        function updateProgress() {
            const completed = userAnswers.filter(a => a && a.submitted).length;
            const percentage = (completed / questions.length) * 100;

            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('progress-text').textContent = `${completed}/${questions.length}`;
        }

        function showResults() {
            let correctCount = 0;

            questions.forEach((question, index) => {
                const answer = userAnswers[index];
                if (answer) {
                    const choice = question.choices.find(c => c.letter === answer.selected);
                    if (choice && choice.correct) correctCount++;
                }
            });

            const incorrectCount = questions.length - correctCount;
            const percentage = Math.round((correctCount / questions.length) * 100);

            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('nav-buttons').style.display = 'none';

            const resultsCard = document.getElementById('results-card');
            resultsCard.classList.add('show');

            document.getElementById('final-score').textContent = `${correctCount}/${questions.length}`;
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('incorrect-count').textContent = incorrectCount;
            document.getElementById('percentage').textContent = percentage + '%';

            let message = '';
            if (percentage >= 80) {
                message = 'Excellent work! You have a strong understanding of industry forces and Five Forces analysis. You\'re ready to apply these concepts to real business situations.';
            } else if (percentage >= 60) {
                message = 'Good effort! You understand the core concepts, but reviewing the material on ' + getWeakAreas() + ' would strengthen your grasp before moving forward.';
            } else {
                message = 'You may want to review the Part 2 content before continuing. Focus especially on ' + getWeakAreas() + '. Understanding these foundations is critical for later modules.';
            }

            document.getElementById('results-message').textContent = message;
            quizCompleted = true;
        }

        function getWeakAreas() {
            const areas = [];

            questions.forEach((question, index) => {
                const answer = userAnswers[index];
                if (answer) {
                    const choice = question.choices.find(c => c.letter === answer.selected);
                    if (!choice || !choice.correct) {
                        if (index === 0) areas.push('the core insight of Five Forces');
                        if (index === 1) areas.push('interpreting industry variance data');
                        if (index === 2) areas.push('barriers to entry');
                        if (index === 3) areas.push('supplier power dynamics');
                        if (index === 4) areas.push('using industry analysis for goal-setting');
                    }
                }
            });

            if (areas.length === 0) return 'all concepts';
            if (areas.length === 1) return areas[0];
            if (areas.length === 2) return areas.join(' and ');
            return areas.slice(0, -1).join(', ') + ', and ' + areas[areas.length - 1];
        }

        function reviewAnswers() {
            document.getElementById('results-card').classList.remove('show');
            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('nav-buttons').style.display = 'flex';
            currentQuestionIndex = 0;
            renderQuestion();
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            userAnswers = [];
            quizCompleted = false;

            document.getElementById('results-card').classList.remove('show');
            document.getElementById('quiz-container').style.display = 'block';

            initQuiz();
        }

        // Initialize quiz on page load
        initQuiz();
    </script>
</body>
</html>
