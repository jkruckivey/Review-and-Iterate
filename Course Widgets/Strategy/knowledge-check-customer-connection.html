<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Check - Customer Connection Basics</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            /* Neutral Palette (Grays) */
            --color-neutral-50: #fafafa;
            --color-neutral-100: #f5f5f5;
            --color-neutral-200: #e5e5e5;
            --color-neutral-300: #d4d4d4;
            --color-neutral-400: #a3a3a3;
            --color-neutral-500: #737373;
            --color-neutral-600: #525252;
            --color-neutral-700: #404040;
            --color-neutral-800: #262626;
            --color-neutral-900: #171717;

            /* Semantic Colors */
            --color-success: #22c55e;
            --color-success-light: #dcfce7;
            --color-success-dark: #15803d;
            --color-error: #ef4444;
            --color-error-light: #fee2e2;
            --color-error-dark: #b91c1c;
            --color-warning: #f59e0b;
            --color-warning-light: #fcd34d;
            --color-warning-dark: #d97706;
            --color-info: #3b82f6;
            --color-info-light: #93c5fd;
            --color-info-dark: #1d4ed8;

            /* Knowledge Check Feedback (Subtle) */
            --color-correct: #c0d1cd;
            --color-correct-bg: #f0f5f4;
            --color-incorrect: #f0ede0;
            --color-incorrect-bg: #faf9f5;

            /* Accent Colors */
            --color-accent: #bfe5e7;
            --color-accent-dark: #5a9ea1;

            /* 3 Elements */
            --color-element-sage: #c0d1cd;
            --color-element-purple: #d5cae0;
            --color-element-blue: #bfe5e7;

            /* Focus state */
            --color-focus: #3182ce;
        }
        body {
            font-family: 'Geist', -apple-system, sans-serif;
            background: white;
            color: var(--color-neutral-900);
            padding: 1.5rem;
            line-height: 1.6;
        }
        .quiz-container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 1.5rem; }
        .header h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.25rem; }
        .header p { color: var(--color-neutral-600); font-size: 0.875rem; }
        .progress-bar { background: var(--color-neutral-100); border-radius: 4px; height: 6px; margin-bottom: 1.5rem; overflow: hidden; }
        .progress-fill { background: var(--color-neutral-900); height: 100%; transition: width 0.3s ease; }
        .question-card { background: var(--color-neutral-50); border: 1px solid var(--color-neutral-200); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        .question-number { font-size: 0.75rem; font-weight: 600; color: var(--color-neutral-500); text-transform: uppercase; margin-bottom: 0.5rem; }
        .question-text { font-size: 1rem; font-weight: 600; color: var(--color-neutral-900); margin-bottom: 1rem; }
        .options { display: flex; flex-direction: column; gap: 0.5rem; }
        .option { background: white; border: 2px solid var(--color-neutral-200); border-radius: 6px; padding: 0.875rem 1rem; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: flex-start; gap: 0.75rem; }
        .option:hover:not(.disabled) { border-color: var(--color-neutral-400); }
        .option:focus { outline: 2px solid var(--color-focus); outline-offset: 2px; }
        .option.selected { border-color: var(--color-neutral-900); background: white; }
        .option.correct { border-color: var(--color-success); background: #f0fdf4; }
        .option.incorrect { border-color: var(--color-error); background: #fef2f2; }
        .option.disabled { cursor: default; opacity: 0.7; }
        .option-letter { width: 24px; height: 24px; border-radius: 50%; background: var(--color-neutral-100); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; color: var(--color-neutral-600); flex-shrink: 0; }
        .option.selected .option-letter { background: var(--color-neutral-900); color: white; }
        .option.correct .option-letter { background: var(--color-success); color: white; }
        .option.incorrect .option-letter { background: var(--color-error); color: white; }
        .option-text { font-size: 0.9rem; color: var(--color-neutral-700); }
        .feedback { margin-top: 1rem; padding: 1rem; border-radius: 6px; font-size: 0.875rem; display: none; }
        .feedback.show { display: block; }
        .feedback.correct { background: #f0fdf4; border: 1px solid var(--color-success); color: #166534; }
        .feedback.incorrect { background: #fef2f2; border: 1px solid var(--color-error); color: #991b1b; }
        .feedback-title { font-weight: 600; margin-bottom: 0.25rem; }
        .btn { background: var(--color-neutral-900); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.2s ease; }
        .btn:hover { background: var(--color-neutral-700); }
        .btn:focus { outline: 2px solid var(--color-focus); outline-offset: 2px; }
        .btn:disabled { background: var(--color-neutral-300); cursor: not-allowed; }
        .btn-container { display: flex; justify-content: space-between; margin-top: 1.5rem; }
        .results { text-align: center; padding: 2rem; background: var(--color-neutral-50); border-radius: 8px; border: 1px solid var(--color-neutral-200); }
        .results h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        .results .score { font-size: 2rem; font-weight: 700; color: var(--color-neutral-900); margin: 1rem 0; }
        .results p { color: var(--color-neutral-600); font-size: 0.9rem; }
        .hidden { display: none; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0; }
        @media (max-width: 768px) { body { padding: 1rem; } .question-card { padding: 1rem; } }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="header">
            <h3>Knowledge Check</h3>
            <p>Test your understanding of customer connection basics before the Milkshake Story</p>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 0%"></div></div>
        <div id="quiz-content"></div>
        <div id="results" class="results hidden">
            <h3>Quiz Complete!</h3>
            <div class="score" id="score-display">0/3</div>
            <p id="score-message"></p>
            <button class="btn" onclick="restartQuiz()" style="margin-top: 1rem;">Try Again</button>
        </div>
    </div>
    <div role="status" aria-live="polite" class="sr-only" id="announcements"></div>
    <script>
        const questions = [
            {
                question: "Why can multiple companies successfully compete within the same strategic position (e.g., high-end restaurants)?",
                options: [
                    "Because customers can't tell the difference between high-quality products",
                    "They serve different customer jobs despite similar positioning",
                    "Geographic separation prevents direct competition",
                    "Pricing differences create effective sub-segments"
                ],
                correct: 1,
                feedback: {
                    correct: "Even within the same position, companies differentiate by serving different customer jobs. Nobu (Japanese theatrical dining), French Laundry (wine-focused tasting menus), and Alinea (molecular gastronomy) all occupy high-end positions but attract customers hiring them for different jobs—anniversary celebration vs culinary innovation vs wine experience.",
                    incorrect: "That's not quite it. The key insight is that even within the same strategic position, companies can differentiate by serving different customer jobs. Two high-end restaurants might both charge premium prices, but one might specialize in the 'celebrate a milestone' job while another serves the 'impress food-savvy clients' job."
                }
            },
            {
                question: "What is the primary limitation of traditional market research methods like focus groups and surveys?",
                options: [
                    "They're too expensive to conduct regularly",
                    "Sample sizes are too small for statistical significance",
                    "They find correlations but miss causation",
                    "Customers intentionally lie about their preferences"
                ],
                correct: 2,
                feedback: {
                    correct: "Traditional research reveals WHAT customers do (correlations: 'Married people buy more milkshakes') but not WHY they do it (causation: 'What job is the milkshake fulfilling?'). Demographics predict patterns but don't explain underlying motivations—the key insight for innovation.",
                    incorrect: "The real limitation isn't about cost, sample size, or dishonesty. Traditional research finds correlations (who buys, when, how much) but fails to uncover causation (why they buy, what job they're trying to accomplish). This is why demographic targeting often fails to drive growth."
                }
            },
            {
                question: "What makes observational research different from traditional market research?",
                options: [
                    "It uses larger sample sizes for better statistical power",
                    "It watches what customers DO instead of asking what they SAY",
                    "It costs less to conduct than surveys and focus groups",
                    "It only works for consumer products, not B2B"
                ],
                correct: 1,
                feedback: {
                    correct: "Observational research involves watching customer behavior in context: When do they buy? What else do they buy? What are they doing before and after? This reveals the actual job being fulfilled rather than post-hoc rationalizations from surveys.",
                    incorrect: "The key difference isn't about sample size, cost, or product type. Observational research watches actual behavior in context rather than relying on what customers say they want. People often can't articulate their true motivations, but their actions reveal the jobs they're trying to accomplish."
                }
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function renderQuestion() {
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';

            const html = `
                <div class="question-card">
                    <div class="question-number">Question ${currentQuestion + 1} of ${questions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" role="radiogroup" aria-label="Answer options">
                        ${q.options.map((opt, i) => `
                            <div class="option" tabindex="0" role="radio" aria-checked="false" data-index="${i}" onclick="selectOption(${i})" onkeydown="handleKeydown(event, ${i})">
                                <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                                <span class="option-text">${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="feedback" id="feedback"></div>
                </div>
                <div class="btn-container">
                    <button class="btn" id="prev-btn" onclick="prevQuestion()" ${currentQuestion === 0 ? 'disabled' : ''}>Previous</button>
                    <button class="btn" id="next-btn" onclick="nextQuestion()" disabled>Next</button>
                </div>
            `;
            document.getElementById('quiz-content').innerHTML = html;
            answered = false;
        }

        function selectOption(index) {
            if (answered) return;
            answered = true;
            const q = questions[currentQuestion];
            const options = document.querySelectorAll('.option');

            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                opt.setAttribute('aria-checked', i === index ? 'true' : 'false');
                if (i === index) {
                    opt.classList.add(i === q.correct ? 'correct' : 'incorrect');
                }
                if (i === q.correct && i !== index) {
                    opt.classList.add('correct');
                }
            });

            const isCorrect = index === q.correct;
            if (isCorrect) score++;

            const feedback = document.getElementById('feedback');
            feedback.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
            feedback.innerHTML = `
                <div class="feedback-title">${isCorrect ? 'Correct!' : 'Not quite.'}</div>
                <div>${isCorrect ? q.feedback.correct : q.feedback.incorrect}</div>
            `;

            document.getElementById('next-btn').disabled = false;
            announce(isCorrect ? 'Correct answer!' : 'Incorrect. See feedback below.');
        }

        function handleKeydown(e, index) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                selectOption(index);
            }
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function showResults() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('progress').style.width = '100%';
            document.getElementById('score-display').textContent = `${score}/${questions.length}`;

            const percentage = (score / questions.length) * 100;
            let message = '';
            if (percentage === 100) message = 'Perfect! You understand the key distinction between correlation and causation, and why observational research reveals what traditional methods miss.';
            else if (percentage >= 66) message = 'Great job! You grasp the basics of customer connection. The Milkshake Story will deepen your understanding of jobs-to-be-done thinking.';
            else message = 'Review the video on customer connection. The key insights are: (1) position doesn\'t determine customer jobs, (2) demographics correlate but don\'t explain causation, (3) watching behavior reveals more than asking questions.';
            document.getElementById('score-message').textContent = message;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');
            renderQuestion();
        }

        function announce(message) {
            const announcer = document.getElementById('announcements');
            announcer.textContent = message;
            setTimeout(() => { announcer.textContent = ''; }, 1000);
        }

        renderQuestion();
    </script>
</body>
</html>
