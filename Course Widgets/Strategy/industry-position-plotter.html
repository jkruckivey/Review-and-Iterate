<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industry Position Plotter - Strategy Course Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Neutral Palette (Grays) */
            --color-neutral-50: #fafafa;
            --color-neutral-100: #f5f5f5;
            --color-neutral-200: #e5e5e5;
            --color-neutral-300: #d4d4d4;
            --color-neutral-400: #a3a3a3;
            --color-neutral-500: #737373;
            --color-neutral-600: #525252;
            --color-neutral-700: #404040;
            --color-neutral-800: #262626;
            --color-neutral-900: #171717;

            /* Semantic Colors */
            --color-success: #22c55e;
            --color-success-light: #dcfce7;
            --color-success-dark: #15803d;
            --color-error: #ef4444;
            --color-error-light: #fee2e2;
            --color-error-dark: #b91c1c;
            --color-warning: #f59e0b;
            --color-warning-light: #fcd34d;
            --color-warning-dark: #d97706;
            --color-info: #3b82f6;
            --color-info-light: #93c5fd;
            --color-info-dark: #1d4ed8;

            /* Knowledge Check Feedback (Subtle) */
            --color-correct: #c0d1cd;
            --color-correct-bg: #f0f5f4;
            --color-incorrect: #f0ede0;
            --color-incorrect-bg: #faf9f5;

            /* Focus State */
            --color-focus: #3182ce;

            /* Accent Colors */
            --color-accent: #bfe5e7;
            --color-accent-dark: #5a9ea1;

            /* 3 Elements */
            --color-element-sage: #c0d1cd;
            --color-element-purple: #d5cae0;
            --color-element-blue: #bfe5e7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: white;
            color: var(--color-neutral-900);
            line-height: 1.6;
            padding: 2rem;
        }
        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--color-neutral-900);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--color-neutral-600);
            margin-bottom: 1.5rem;
        }

        .workspace {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* Industry Cards */
        .cards-panel {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1.5rem;
            height: fit-content;
        }

        .cards-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--color-neutral-900);
        }

        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 600px;
            overflow-y: auto;
        }

        .industry-card {
            background: var(--color-neutral-50);
            border: 2px solid var(--color-neutral-300);
            border-radius: 6px;
            padding: 1rem;
            cursor: move;
            transition: all 0.2s;
        }

        .industry-card:hover {
            border-color: var(--color-neutral-500);
            background: var(--color-neutral-100);
        }

        .industry-card.dragging {
            opacity: 0.5;
        }

        .industry-card.placed {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .industry-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            color: var(--color-neutral-900);
        }

        .industry-metrics {
            font-size: 0.8rem;
            color: var(--color-neutral-600);
            line-height: 1.5;
        }

        .industry-metrics div {
            margin-bottom: 0.25rem;
        }

        /* Chart Canvas */
        .chart-panel {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 2rem;
        }

        .chart-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--color-neutral-900);
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 600px;
            border: 2px solid var(--color-neutral-700);
            border-radius: 4px;
            background: var(--color-neutral-50);
        }

        .chart-dropzone {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .chart-dropzone.drag-over {
            background: var(--color-neutral-100);
        }

        /* Axes */
        .axis-label {
            position: absolute;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-neutral-700);
        }

        .axis-label.x-axis {
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
        }

        .axis-label.y-axis {
            left: -140px;
            top: 50%;
            transform: rotate(-90deg) translateX(-50%);
            transform-origin: center;
        }

        /* Grid lines */
        .grid-line {
            position: absolute;
            background: var(--color-neutral-300);
        }

        .grid-line.vertical {
            width: 1px;
            height: 100%;
            top: 0;
        }

        .grid-line.horizontal {
            height: 1px;
            width: 100%;
            left: 0;
        }

        /* Axis ticks */
        .axis-tick {
            position: absolute;
            font-size: 0.75rem;
            color: var(--color-neutral-600);
        }

        .axis-tick.x-tick {
            bottom: -25px;
            transform: translateX(-50%);
        }

        .axis-tick.y-tick {
            left: -35px;
            transform: translateY(-50%);
        }

        /* Placed bubbles */
        .placed-bubble {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--color-neutral-700);
            background: rgba(64, 64, 64, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
            color: var(--color-neutral-900);
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all 0.2s;
            padding: 0.5rem;
        }

        .placed-bubble:hover {
            background: rgba(64, 64, 64, 0.3);
            z-index: 10;
        }

        .placed-bubble.validated {
            border-width: 3px;
        }

        .placed-bubble.correct {
            border-color: var(--color-correct);
            background: var(--color-correct-bg);
        }

        .placed-bubble.close {
            border-color: var(--color-warning);
            background: var(--color-warning-light);
        }

        .placed-bubble.incorrect {
            border-color: var(--color-incorrect);
            background: var(--color-incorrect-bg);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn {
            background: var(--color-neutral-700);
            color: white;
            border: 1px solid var(--color-neutral-700);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            background: var(--color-neutral-800);
            border-color: var(--color-neutral-800);
        }

        .btn:disabled {
            background: var(--color-neutral-300);
            border-color: var(--color-neutral-300);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: var(--color-neutral-700);
            border: 1px solid var(--color-neutral-300);
        }

        .btn-secondary:hover {
            background: var(--color-neutral-50);
            border-color: var(--color-neutral-400);
        }

        /* Results Panel */
        .results-panel {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 2rem;
            margin-top: 2rem;
            display: none;
        }

        .results-panel.show {
            display: block;
        }

        .results-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--color-neutral-900);
        }

        .results-summary {
            background: var(--color-neutral-100);
            border-left: 3px solid var(--color-neutral-700);
            padding: 1.25rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
        }

        .results-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--color-neutral-700);
            margin-bottom: 1rem;
        }

        .results-text:last-child {
            margin-bottom: 0;
        }

        .insight-section {
            background: var(--color-neutral-50);
            border-radius: 4px;
            padding: 1.25rem;
            margin-top: 1.5rem;
        }

        .insight-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--color-neutral-900);
            margin-bottom: 0.75rem;
        }

        .insight-text {
            font-size: 0.95rem;
            color: var(--color-neutral-700);
            line-height: 1.6;
        }

        @media (max-width: 1024px) {
            .workspace {
                grid-template-columns: 1fr;
            }

            .cards-container {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Industry Position Plotter</h1>
            <p class="subtitle">Analyze real industry data and position industries on a strategic landscape</p>
        </header>

        <div class="workspace">
            <!-- Left Panel: Industry Cards -->
            <div class="cards-panel">
                <h2 class="cards-title">Industry Data Cards</h2>
                <p style="font-size: 0.85rem; color: var(--color-neutral-600); margin-bottom: 1rem;">
                    Drag each card to the chart →
                </p>
                <div class="cards-container" id="cards-container">
                    <!-- Cards will be generated here -->
                </div>
            </div>

            <!-- Right Panel: Chart -->
            <div class="chart-panel">
                <h2 class="chart-title">Strategic Position Chart</h2>
                <div class="chart-container">
                    <!-- Grid lines -->
                    <div class="grid-line vertical" style="left: 25%;"></div>
                    <div class="grid-line vertical" style="left: 50%;"></div>
                    <div class="grid-line vertical" style="left: 75%;"></div>
                    <div class="grid-line horizontal" style="top: 25%;"></div>
                    <div class="grid-line horizontal" style="top: 50%;"></div>
                    <div class="grid-line horizontal" style="top: 75%;"></div>

                    <!-- Axis labels -->
                    <div class="axis-label x-axis">Profit Margin (%)</div>
                    <div class="axis-label y-axis">Survival Rate (%)</div>

                    <!-- Axis ticks -->
                    <div class="axis-tick x-tick" style="left: 0;">0%</div>
                    <div class="axis-tick x-tick" style="left: 25%;">5%</div>
                    <div class="axis-tick x-tick" style="left: 50%;">10%</div>
                    <div class="axis-tick x-tick" style="left: 75%;">15%</div>
                    <div class="axis-tick x-tick" style="left: 100%;">20%</div>

                    <div class="axis-tick y-tick" style="top: 100%;">80%</div>
                    <div class="axis-tick y-tick" style="top: 75%;">85%</div>
                    <div class="axis-tick y-tick" style="top: 50%;">90%</div>
                    <div class="axis-tick y-tick" style="top: 25%;">95%</div>
                    <div class="axis-tick y-tick" style="top: 0;">100%</div>

                    <!-- Drop zone -->
                    <div class="chart-dropzone" id="chart-dropzone">
                        <!-- Placed bubbles will appear here -->
                    </div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn" id="validate-btn" onclick="validatePositioning()" disabled>Compare with Expert Analysis</button>
            <button class="btn btn-secondary" onclick="resetWidget()">Reset All</button>
        </div>

        <div class="results-panel" id="results-panel">
            <h2 class="results-title">Expert Analysis</h2>
            <div id="results-content">
                <!-- Results will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        // Industry data with real metrics (sourced from industry reports)
        const industries = [
            {
                id: 'pharma',
                name: 'Pharmaceuticals',
                competitors: 150,
                profitMargin: 18.5,
                exitRate: 7,
                survivalRate: 93,
                churn: 4,
                source: 'IBISWorld 2023'
            },
            {
                id: 'airlines',
                name: 'Airlines',
                competitors: 25,
                profitMargin: 3.2,
                exitRate: 15,
                survivalRate: 85,
                churn: 8,
                source: 'BLS 2023'
            },
            {
                id: 'software',
                name: 'Software & IT Services',
                competitors: 200,
                profitMargin: 16.8,
                exitRate: 12,
                survivalRate: 88,
                churn: 6,
                source: 'Gartner 2023'
            },
            {
                id: 'restaurants',
                name: 'Restaurants',
                competitors: 500,
                profitMargin: 6.5,
                exitRate: 20,
                survivalRate: 80,
                churn: 12,
                source: 'National Restaurant Association 2023'
            },
            {
                id: 'medical-devices',
                name: 'Medical Devices',
                competitors: 80,
                profitMargin: 12.3,
                exitRate: 9,
                survivalRate: 91,
                churn: 5,
                source: 'FDA Industry Analysis 2023'
            },
            {
                id: 'retail',
                name: 'Retail - General',
                competitors: 350,
                profitMargin: 5.1,
                exitRate: 18,
                survivalRate: 82,
                churn: 10,
                source: 'Census Bureau 2023'
            },
            {
                id: 'hotels',
                name: 'Hotels & Hospitality',
                competitors: 180,
                profitMargin: 4.8,
                exitRate: 16,
                survivalRate: 84,
                churn: 11,
                source: 'American Hotel & Lodging 2023'
            },
            {
                id: 'banking',
                name: 'Banking & Financial',
                competitors: 120,
                profitMargin: 11.5,
                exitRate: 10,
                survivalRate: 90,
                churn: 6,
                source: 'FDIC 2023'
            },
            {
                id: 'automotive',
                name: 'Automotive Manufacturing',
                competitors: 45,
                profitMargin: 7.2,
                exitRate: 14,
                survivalRate: 86,
                churn: 7,
                source: 'OICA 2023'
            },
            {
                id: 'telecom',
                name: 'Telecommunications',
                competitors: 60,
                profitMargin: 9.8,
                exitRate: 11,
                survivalRate: 89,
                churn: 6,
                source: 'FCC Industry Report 2023'
            }
        ];

        let placedIndustries = [];

        // Initialize cards
        function initializeCards() {
            const container = document.getElementById('cards-container');

            industries.forEach(industry => {
                const card = document.createElement('div');
                card.className = 'industry-card';
                card.draggable = true;
                card.dataset.industryId = industry.id;

                card.innerHTML = `
                    <div class="industry-name">${industry.name}</div>
                    <div class="industry-metrics">
                        <div><strong>Competitors:</strong> ${industry.competitors}</div>
                        <div><strong>Profit Margin:</strong> ${industry.profitMargin}%</div>
                        <div><strong>5-yr Exit Rate:</strong> ${industry.exitRate}%</div>
                        <div><strong>Survival Rate:</strong> ${industry.survivalRate}%</div>
                        <div><strong>Annual Churn:</strong> ${industry.churn}%</div>
                    </div>
                `;

                // Drag events
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragend', handleDragEnd);

                container.appendChild(card);
            });
        }

        let draggedIndustryId = null;

        function handleDragStart(e) {
            const card = e.target.closest('.industry-card');
            if (card.classList.contains('placed')) {
                e.preventDefault();
                return;
            }
            draggedIndustryId = card.dataset.industryId;
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.closest('.industry-card').classList.remove('dragging');
        }

        // Drop zone events
        const dropzone = document.getElementById('chart-dropzone');

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            dropzone.classList.add('drag-over');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('drag-over');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('drag-over');

            if (!draggedIndustryId) return;

            const rect = dropzone.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Convert pixel position to percentage
            const xPercent = (x / rect.width) * 100;
            const yPercent = (y / rect.height) * 100;

            placeBubble(draggedIndustryId, xPercent, yPercent);

            // Mark card as placed
            const card = document.querySelector(`[data-industry-id="${draggedIndustryId}"]`);
            card.classList.add('placed');
            card.draggable = false;

            draggedIndustryId = null;

            // Enable validation if all placed
            if (placedIndustries.length === industries.length) {
                document.getElementById('validate-btn').disabled = false;
            }
        });

        function placeBubble(industryId, xPercent, yPercent) {
            const industry = industries.find(i => i.id === industryId);

            // Bubble size based on competitors (scale: 40-120px)
            const minSize = 40;
            const maxSize = 120;
            const maxCompetitors = Math.max(...industries.map(i => i.competitors));
            const size = minSize + ((industry.competitors / maxCompetitors) * (maxSize - minSize));

            const bubble = document.createElement('div');
            bubble.className = 'placed-bubble';
            bubble.dataset.industryId = industryId;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = xPercent + '%';
            bubble.style.top = yPercent + '%';
            bubble.style.fontSize = (size / 8) + 'px';
            bubble.textContent = industry.name;

            dropzone.appendChild(bubble);

            placedIndustries.push({
                id: industryId,
                xPercent,
                yPercent
            });
        }

        function validatePositioning() {
            let correctCount = 0;
            let closeCount = 0;
            let incorrectCount = 0;

            placedIndustries.forEach(placed => {
                const industry = industries.find(i => i.id === placed.id);
                const bubble = document.querySelector(`.placed-bubble[data-industry-id="${placed.id}"]`);

                // Calculate expected position
                // X-axis: 0-20% profit margin maps to 0-100% of chart width
                const expectedX = (industry.profitMargin / 20) * 100;
                // Y-axis: 80-100% survival rate maps to 100-0% of chart height (inverted)
                const expectedY = ((100 - industry.survivalRate) / 20) * 100;

                // Calculate distance from expected position
                const distance = Math.sqrt(
                    Math.pow(placed.xPercent - expectedX, 2) +
                    Math.pow(placed.yPercent - expectedY, 2)
                );

                bubble.classList.add('validated');

                if (distance < 10) {
                    bubble.classList.add('correct');
                    correctCount++;
                } else if (distance < 20) {
                    bubble.classList.add('close');
                    closeCount++;
                } else {
                    bubble.classList.add('incorrect');
                    incorrectCount++;
                }
            });

            showResults(correctCount, closeCount, incorrectCount);
        }

        function showResults(correct, close, incorrect) {
            const resultsPanel = document.getElementById('results-panel');
            const resultsContent = document.getElementById('results-content');

            const total = industries.length;
            const score = ((correct + (close * 0.5)) / total) * 100;

            let feedbackLevel = '';
            let feedbackText = '';

            if (score >= 80) {
                feedbackLevel = 'Excellent Analysis';
                feedbackText = `You correctly positioned ${correct} out of ${total} industries, with ${close} very close. Your understanding of how profit margins and survival rates relate to industry structure is strong.`;
            } else if (score >= 60) {
                feedbackLevel = 'Good Progress';
                feedbackText = `You positioned ${correct} industries correctly and ${close} close to the mark. Review the industries marked in red - what might you have missed in their data?`;
            } else {
                feedbackLevel = 'Keep Learning';
                feedbackText = `You correctly placed ${correct} industries. This is a challenging exercise - compare your positioning with the patterns below to understand industry clustering.`;
            }

            resultsContent.innerHTML = `
                <div class="results-summary">
                    <div class="results-text"><strong>${feedbackLevel}</strong></div>
                    <div class="results-text">${feedbackText}</div>
                    <div class="results-text" style="margin-top: 0.75rem;">
                        <strong>Your Score:</strong> ${correct} correct (green), ${close} close (yellow), ${incorrect} need revision (red)
                    </div>
                </div>

                <div class="insight-section">
                    <div class="insight-title">Key Strategic Insights</div>
                    <div class="insight-text">
                        <strong>High-Margin, High-Survival Cluster:</strong> Pharmaceuticals, Medical Devices, and Software cluster in the upper-right quadrant. These industries have strong barriers to entry (regulatory approval, patents, network effects) that protect both margins and survival rates.
                    </div>
                    <div class="insight-text" style="margin-top: 1rem;">
                        <strong>Low-Margin, Low-Survival Cluster:</strong> Airlines, Restaurants, Retail, and Hotels cluster in the lower-left. These industries share common traits: low barriers to entry, intense rivalry, high buyer power, and commoditized offerings.
                    </div>
                    <div class="insight-text" style="margin-top: 1rem;">
                        <strong>The Porter Insight:</strong> Your positioning reveals which industries are "higher mountains to climb." Roughly 20% of firm performance variation comes from industry structure alone - meaning your choice of industry matters as much as your strategy within it.
                    </div>
                </div>

                <div class="insight-section">
                    <div class="insight-title">Notice the Bubble Sizes</div>
                    <div class="insight-text">
                        Larger bubbles (more competitors) often correlate with lower margins and survival rates. Restaurants (500+ competitors) and Software (200+ firms) show how fragmentation impacts industry dynamics differently depending on other structural forces.
                    </div>
                </div>
            `;

            resultsPanel.classList.add('show');
            resultsPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function resetWidget() {
            // Clear placed bubbles
            dropzone.querySelectorAll('.placed-bubble').forEach(b => b.remove());
            placedIndustries = [];

            // Reset cards
            document.querySelectorAll('.industry-card').forEach(card => {
                card.classList.remove('placed');
                card.draggable = true;
            });

            // Hide results
            document.getElementById('results-panel').classList.remove('show');
            document.getElementById('validate-btn').disabled = true;
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initializeCards);
    </script>
</body>
</html>
