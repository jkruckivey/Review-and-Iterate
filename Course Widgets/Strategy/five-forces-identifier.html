<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Forces Identifier - Strategy Course Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Neutral Palette (Grays) */
            --color-neutral-50: #fafafa;
            --color-neutral-100: #f5f5f5;
            --color-neutral-200: #e5e5e5;
            --color-neutral-300: #d4d4d4;
            --color-neutral-400: #a3a3a3;
            --color-neutral-500: #737373;
            --color-neutral-600: #525252;
            --color-neutral-700: #404040;
            --color-neutral-800: #262626;
            --color-neutral-900: #171717;

            /* Semantic Colors */
            --color-success: #22c55e;
            --color-success-light: #dcfce7;
            --color-success-dark: #15803d;
            --color-error: #ef4444;
            --color-error-light: #fee2e2;
            --color-error-dark: #b91c1c;
            --color-warning: #f59e0b;
            --color-warning-light: #fcd34d;
            --color-warning-dark: #d97706;
            --color-info: #3b82f6;
            --color-info-light: #93c5fd;
            --color-info-dark: #1d4ed8;

            /* Knowledge Check Feedback (Subtle) */
            --color-correct: #c0d1cd;
            --color-correct-bg: #f0f5f4;
            --color-incorrect: #f0ede0;
            --color-incorrect-bg: #faf9f5;

            /* Focus State */
            --color-focus: #3182ce;

            /* Accent Colors */
            --color-accent: #bfe5e7;
            --color-accent-dark: #5a9ea1;

            /* 3 Elements */
            --color-element-sage: #c0d1cd;
            --color-element-purple: #d5cae0;
            --color-element-blue: #bfe5e7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: white;
            color: var(--color-neutral-900);
            line-height: 1.6;
            padding: 2rem;
        }
        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--color-neutral-900);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--color-neutral-600);
            margin-bottom: 1.5rem;
        }

        .widget-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .scenarios-section {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .scenarios-section h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--color-neutral-900);
        }

        .scenario-card {
            background: var(--color-neutral-50);
            border: 1px solid var(--color-neutral-300);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: move;
            transition: all 0.2s;
            user-select: none;
        }

        .scenario-card:hover {
            border-color: var(--color-neutral-400);
            background: var(--color-neutral-100);
        }

        .scenario-card.selected {
            border-color: var(--color-neutral-700);
            background: var(--color-neutral-100);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .scenario-card.matched {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--color-neutral-200);
        }

        .scenario-card.matched:hover {
            border-color: var(--color-neutral-300);
            background: var(--color-neutral-200);
        }

        .scenario-text {
            font-size: 0.95rem;
            color: var(--color-neutral-800);
            line-height: 1.5;
        }

        .forces-section {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .forces-section h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--color-neutral-900);
        }

        .force-zone {
            background: var(--color-neutral-50);
            border: 2px dashed var(--color-neutral-300);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1rem;
            min-height: 80px;
            transition: all 0.2s;
        }

        .force-zone:hover {
            border-color: var(--color-neutral-400);
            background: var(--color-neutral-100);
        }

        .force-zone.highlight {
            border-color: var(--color-neutral-700);
            background: var(--color-neutral-100);
        }

        .force-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--color-neutral-900);
            margin-bottom: 0.5rem;
        }

        .force-matches {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .matched-scenario {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            padding: 0.75rem;
            font-size: 0.9rem;
            color: var(--color-neutral-800);
            position: relative;
        }

        .matched-scenario.correct {
            border-color: var(--color-neutral-700);
            background: var(--color-neutral-100);
        }

        .matched-scenario .check {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-neutral-900);
            font-weight: 600;
        }

        .progress-section {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .progress-bar-container {
            background: var(--color-neutral-200);
            border-radius: 4px;
            height: 8px;
            margin-bottom: 0.5rem;
            overflow: hidden;
        }

        .progress-bar {
            background: var(--color-neutral-800);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.9rem;
            color: var(--color-neutral-600);
            text-align: center;
        }

        .feedback-panel {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: none;
        }

        .feedback-panel.show {
            display: block;
        }

        .feedback-panel h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--color-neutral-900);
        }

        .feedback-panel p {
            color: var(--color-neutral-700);
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .btn {
            background: var(--color-neutral-700);
            color: white;
            border: 1px solid var(--color-neutral-700);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--color-neutral-800);
            border-color: var(--color-neutral-800);
        }

        .btn:disabled {
            background: var(--color-neutral-300);
            border-color: var(--color-neutral-300);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: var(--color-neutral-700);
            border: 1px solid var(--color-neutral-300);
        }

        .btn-secondary:hover {
            background: var(--color-neutral-50);
            border-color: var(--color-neutral-400);
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .widget-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Five Forces Identifier</h1>
            <p class="subtitle">Practice recognizing Porter's Five Forces in real-world scenarios</p>
        </header>

        <div class="progress-section">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-text" id="progress-text">0 of 8 scenarios matched</div>
        </div>

        <div class="widget-layout">
            <div class="scenarios-section">
                <h2>Scenarios</h2>
                <div id="scenarios-container">
                    <!-- Scenarios will be inserted here -->
                </div>
            </div>

            <div class="forces-section">
                <h2>Five Forces</h2>

                <div class="force-zone" data-force="rivalry" onclick="matchToForce('rivalry')">
                    <div class="force-title">Competitive Rivalry</div>
                    <div class="force-matches" id="matches-rivalry"></div>
                </div>

                <div class="force-zone" data-force="new-entrants" onclick="matchToForce('new-entrants')">
                    <div class="force-title">Threat of New Entrants</div>
                    <div class="force-matches" id="matches-new-entrants"></div>
                </div>

                <div class="force-zone" data-force="suppliers" onclick="matchToForce('suppliers')">
                    <div class="force-title">Bargaining Power of Suppliers</div>
                    <div class="force-matches" id="matches-suppliers"></div>
                </div>

                <div class="force-zone" data-force="buyers" onclick="matchToForce('buyers')">
                    <div class="force-title">Bargaining Power of Buyers</div>
                    <div class="force-matches" id="matches-buyers"></div>
                </div>

                <div class="force-zone" data-force="substitutes" onclick="matchToForce('substitutes')">
                    <div class="force-title">Threat of Substitutes</div>
                    <div class="force-matches" id="matches-substitutes"></div>
                </div>
            </div>
        </div>

        <div class="feedback-panel" id="feedback-panel">
            <h3>Excellent Work!</h3>
            <p id="feedback-text"></p>
            <button class="btn" onclick="location.reload()">Try Again with Different Scenarios</button>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <button class="btn btn-secondary" onclick="resetWidget()">Reset Widget</button>
        </div>
    </div>

    <script>
        // Scenario data - each scenario maps to a specific force
        const scenarios = [
            {
                id: 1,
                text: "Walmart negotiates lower prices from Procter & Gamble due to its massive purchasing volume",
                force: "buyers",
                explanation: "This demonstrates buyer power - Walmart's large order volume gives it leverage to negotiate lower prices from suppliers."
            },
            {
                id: 2,
                text: "Uber reshapes the traditional taxi industry by offering a convenient app-based service and operating outside the industry's traditional regulatory structure",
                force: "substitutes",
                explanation: "This demonstrates the threat of substitutes - Uber provides a competitive service but operates under different rules than traditional taxi companies. Because Uber isn't subject to the same regulations (medallions, meter rates, vehicle requirements), it's a substitute rather than a new entrant into the taxi industry proper."
            },
            {
                id: 3,
                text: "Airlines engage in aggressive price competition on popular routes, reducing profit margins",
                force: "rivalry",
                explanation: "This exemplifies competitive rivalry - airlines directly compete with each other on price, intensifying competition and eroding profits."
            },
            {
                id: 4,
                text: "Streaming services like Netflix threaten traditional cable TV subscriptions",
                force: "new-entrants",
                explanation: "This demonstrates the threat of new entrants - Netflix entered the same industry (video entertainment delivery) with a different strategy. Unlike Uber, Netflix operates within the same regulatory structure as cable companies and competes for the same content licenses. It's a new entrant with a disruptive business model, not a substitute product."
            },
            {
                id: 5,
                text: "Intel dominates the PC processor market, allowing it to set premium prices for chips",
                force: "suppliers",
                explanation: "This shows supplier power - Intel's dominance in processors gives it leverage to set prices for PC manufacturers."
            },
            {
                id: 6,
                text: "Pharmaceutical companies face high barriers to entry due to FDA approval requirements and R&D costs",
                force: "new-entrants",
                explanation: "This demonstrates barriers to new entrants - regulatory requirements and high costs prevent new companies from easily entering the pharmaceutical industry."
            },
            {
                id: 7,
                text: "Amazon and Target compete fiercely for market share in online retail",
                force: "rivalry",
                explanation: "This shows competitive rivalry - Amazon and Target are direct competitors fighting for the same customers in e-commerce."
            },
            {
                id: 8,
                text: "Large hospital systems negotiate lower prices for medical devices due to bulk purchasing",
                force: "buyers",
                explanation: "This demonstrates buyer power - hospitals' large purchasing volumes give them leverage to negotiate better prices from medical device suppliers."
            }
        ];

        let selectedScenario = null;
        let matchedCount = 0;
        let correctMatches = 0;

        // Initialize widget
        function initializeWidget() {
            const container = document.getElementById('scenarios-container');

            // Shuffle scenarios for variety
            const shuffled = [...scenarios].sort(() => Math.random() - 0.5);

            shuffled.forEach(scenario => {
                const card = document.createElement('div');
                card.className = 'scenario-card';
                card.dataset.scenarioId = scenario.id;
                card.onclick = () => selectScenario(scenario.id);

                card.innerHTML = `<div class="scenario-text">${scenario.text}</div>`;

                container.appendChild(card);
            });
        }

        function selectScenario(scenarioId) {
            // Don't allow selection of already matched scenarios
            const scenario = scenarios.find(s => s.id === scenarioId);
            const card = document.querySelector(`[data-scenario-id="${scenarioId}"]`);

            if (card.classList.contains('matched')) {
                return;
            }

            // Clear previous selection
            document.querySelectorAll('.scenario-card').forEach(c => {
                c.classList.remove('selected');
            });

            // Select new scenario
            card.classList.add('selected');
            selectedScenario = scenario;

            // Highlight force zones
            document.querySelectorAll('.force-zone').forEach(zone => {
                zone.classList.add('highlight');
            });
        }

        function matchToForce(force) {
            if (!selectedScenario) {
                alert('Please select a scenario first!');
                return;
            }

            const isCorrect = selectedScenario.force === force;
            const card = document.querySelector(`[data-scenario-id="${selectedScenario.id}"]`);
            const matchesContainer = document.getElementById(`matches-${force}`);

            // Create matched scenario element
            const matchedElement = document.createElement('div');
            matchedElement.className = 'matched-scenario';
            if (isCorrect) {
                matchedElement.classList.add('correct');
                correctMatches++;
            }

            matchedElement.innerHTML = `
                ${selectedScenario.text}
                <span class="check">${isCorrect ? '✓' : '✗'}</span>
            `;

            matchesContainer.appendChild(matchedElement);

            // Mark scenario as matched
            card.classList.add('matched');
            card.classList.remove('selected');

            // Show brief explanation
            if (!isCorrect) {
                const correctForce = selectedScenario.force;
                const correctForceName = document.querySelector(`[data-force="${correctForce}"] .force-title`).textContent;
                setTimeout(() => {
                    alert(`Not quite! This scenario actually represents: ${correctForceName}\n\n${selectedScenario.explanation}`);

                    // Move to correct force
                    matchedElement.remove();
                    const correctContainer = document.getElementById(`matches-${correctForce}`);
                    matchedElement.classList.add('correct');
                    matchedElement.querySelector('.check').textContent = '✓';
                    correctContainer.appendChild(matchedElement);
                    correctMatches++;
                }, 100);
            }

            // Update progress
            matchedCount++;
            updateProgress();

            // Clear selection
            selectedScenario = null;
            document.querySelectorAll('.force-zone').forEach(zone => {
                zone.classList.remove('highlight');
            });

            // Check if complete
            if (matchedCount === scenarios.length) {
                showFeedback();
            }
        }

        function updateProgress() {
            const percentage = (matchedCount / scenarios.length) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
            document.getElementById('progress-text').textContent = `${matchedCount} of ${scenarios.length} scenarios matched`;
        }

        function showFeedback() {
            const accuracy = (correctMatches / scenarios.length) * 100;
            const panel = document.getElementById('feedback-panel');
            const text = document.getElementById('feedback-text');

            let message = '';
            if (accuracy === 100) {
                message = `Perfect! You correctly identified all ${scenarios.length} scenarios on your first try. You have a strong understanding of how to recognize the Five Forces in action.`;
            } else if (accuracy >= 75) {
                message = `Great job! You correctly identified ${correctMatches} out of ${scenarios.length} scenarios (${accuracy.toFixed(0)}% accuracy). You're developing a good sense for recognizing the Five Forces. Review the scenarios you missed to strengthen your understanding.`;
            } else if (accuracy >= 50) {
                message = `Good effort! You correctly identified ${correctMatches} out of ${scenarios.length} scenarios (${accuracy.toFixed(0)}% accuracy). Continue practicing to improve your ability to distinguish between the different forces.`;
            } else {
                message = `You identified ${correctMatches} out of ${scenarios.length} scenarios correctly (${accuracy.toFixed(0)}% accuracy). Review the Five Forces framework and pay attention to the key characteristics of each force. Try the widget again to improve your recognition skills.`;
            }

            text.textContent = message;
            panel.classList.add('show');
        }

        function resetWidget() {
            matchedCount = 0;
            correctMatches = 0;
            selectedScenario = null;

            // Clear all matches
            document.querySelectorAll('.force-matches').forEach(container => {
                container.innerHTML = '';
            });

            // Reset scenarios
            document.getElementById('scenarios-container').innerHTML = '';
            initializeWidget();

            // Reset progress
            updateProgress();

            // Hide feedback
            document.getElementById('feedback-panel').classList.remove('show');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeWidget);
    </script>
</body>
</html>
