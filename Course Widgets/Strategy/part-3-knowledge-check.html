<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 3: Knowledge Check - Strategic Positioning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Neutral Palette (Grays) */
            --color-neutral-50: #fafafa;
            --color-neutral-100: #f5f5f5;
            --color-neutral-200: #e5e5e5;
            --color-neutral-300: #d4d4d4;
            --color-neutral-400: #a3a3a3;
            --color-neutral-500: #737373;
            --color-neutral-600: #525252;
            --color-neutral-700: #404040;
            --color-neutral-800: #262626;
            --color-neutral-900: #171717;

            /* Semantic Colors */
            --color-success: #22c55e;
            --color-success-light: #dcfce7;
            --color-success-dark: #15803d;
            --color-error: #ef4444;
            --color-error-light: #fee2e2;
            --color-error-dark: #b91c1c;
            --color-warning: #f59e0b;
            --color-warning-light: #fcd34d;
            --color-warning-dark: #d97706;
            --color-info: #3b82f6;
            --color-info-light: #93c5fd;
            --color-info-dark: #1d4ed8;

            /* Knowledge Check Feedback (Subtle) */
            --color-correct: #c0d1cd;
            --color-correct-bg: #f0f5f4;
            --color-incorrect: #f0ede0;
            --color-incorrect-bg: #faf9f5;

            /* Focus State */
            --color-focus: #3182ce;

            /* Accent Colors */
            --color-accent: #bfe5e7;
            --color-accent-dark: #5a9ea1;

            /* 3 Elements */
            --color-element-sage: #c0d1cd;
            --color-element-purple: #d5cae0;
            --color-element-blue: #bfe5e7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: white;
            color: var(--color-neutral-900);
            line-height: 1.6;
            padding: 2rem;
        }
        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--color-neutral-300);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--color-neutral-900);
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--color-neutral-600);
            margin-bottom: 1rem;
        }

        .progress-bar {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .progress-label {
            font-size: 0.9rem;
            color: var(--color-neutral-600);
        }

        .progress-fill-container {
            flex: 1;
            margin: 0 1rem;
            height: 8px;
            background: var(--color-neutral-200);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--color-accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-card {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .question-number {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--color-neutral-500);
            margin-bottom: 0.75rem;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--color-neutral-900);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .choice {
            background: var(--color-neutral-50);
            border: 1px solid var(--color-neutral-300);
            border-radius: 6px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .choice:hover:not(.disabled) {
            border-color: var(--color-neutral-400);
            background: white;
        }

        .choice.selected {
            border-color: var(--color-neutral-700);
            background: white;
        }

        .choice.correct {
            border-color: var(--color-correct);
            background: var(--color-correct-bg);
        }

        .choice.incorrect {
            border-color: var(--color-incorrect);
            background: var(--color-incorrect-bg);
            opacity: 0.7;
        }

        .choice.disabled {
            cursor: not-allowed;
        }

        .choice-letter {
            font-weight: 600;
            color: var(--color-neutral-700);
            flex-shrink: 0;
        }

        .choice-text {
            font-size: 0.95rem;
            color: var(--color-neutral-900);
            flex: 1;
        }

        .feedback {
            background: var(--color-neutral-100);
            border: 1px solid var(--color-neutral-300);
            border-radius: 6px;
            padding: 1.25rem;
            margin-top: 1.5rem;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback-header {
            font-weight: 600;
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }

        .feedback-header.correct {
            color: var(--color-neutral-900);
        }

        .feedback-header.incorrect {
            color: var(--color-neutral-700);
        }

        .feedback-text {
            font-size: 0.95rem;
            color: var(--color-neutral-700);
            line-height: 1.6;
        }

        .navigation {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn {
            background: var(--color-neutral-700);
            color: white;
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--color-neutral-700);
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Geist', sans-serif;
        }

        .btn:hover:not(:disabled) {
            background: var(--color-neutral-800);
            border-color: var(--color-neutral-800);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: var(--color-neutral-700);
            border: 1px solid var(--color-neutral-300);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--color-neutral-50);
            border-color: var(--color-neutral-400);
        }

        .results-card {
            background: white;
            border: 1px solid var(--color-neutral-300);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            display: none;
        }

        .results-card.show {
            display: block;
        }

        .results-score {
            font-size: 3rem;
            font-weight: 600;
            color: var(--color-neutral-900);
            margin-bottom: 0.5rem;
        }

        .results-label {
            font-size: 1.1rem;
            color: var(--color-neutral-600);
            margin-bottom: 1.5rem;
        }

        .results-message {
            font-size: 1rem;
            color: var(--color-neutral-700);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .results-breakdown {
            background: var(--color-neutral-50);
            border: 1px solid var(--color-neutral-300);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--color-neutral-200);
            font-size: 0.95rem;
        }

        .breakdown-item:last-child {
            border-bottom: none;
        }

        .breakdown-label {
            color: var(--color-neutral-700);
        }

        .breakdown-value {
            font-weight: 600;
            color: var(--color-neutral-900);
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .question-card {
                padding: 1.5rem;
            }

            .navigation {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Part 3: Knowledge Check</h1>
            <p class="subtitle">Strategic Positioning & Value Proposition</p>
            <p class="subtitle" style="font-size: 0.85rem; margin-top: 0.5rem;">Self-assessment quiz • 5 questions • ~5-7 minutes</p>
        </header>


        <div class="progress-bar">
            <span class="progress-label">Progress:</span>
            <div class="progress-fill-container">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="progress-label" id="progress-text">0/5</span>
        </div>

        <div id="quiz-container"></div>

        <div class="navigation" id="nav-buttons" style="display: none;">
            <button class="btn btn-secondary" id="prev-btn" onclick="previousQuestion()">Previous</button>
            <button class="btn" id="next-btn" onclick="nextQuestion()">Next Question</button>
        </div>

        <div class="results-card" id="results-card">
            <div class="results-score" id="final-score">0/5</div>
            <div class="results-label">Questions Correct</div>
            <div class="results-message" id="results-message"></div>

            <div class="results-breakdown">
                <div class="breakdown-item">
                    <span class="breakdown-label">Correct Answers</span>
                    <span class="breakdown-value" id="correct-count">0</span>
                </div>
                <div class="breakdown-item">
                    <span class="breakdown-label">Incorrect Answers</span>
                    <span class="breakdown-value" id="incorrect-count">0</span>
                </div>
                <div class="breakdown-item">
                    <span class="breakdown-label">Percentage</span>
                    <span class="breakdown-value" id="percentage">0%</span>
                </div>
            </div>

            <div class="navigation">
                <button class="btn btn-secondary" onclick="reviewAnswers()">Review Answers</button>
                <button class="btn" onclick="restartQuiz()">Retake Quiz</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                text: "What does the 'productivity frontier' represent in strategic positioning?",
                choices: [
                    {
                        letter: "A",
                        text: "The maximum profit margin achievable in a given industry.",
                        correct: false,
                        feedback: "Not quite. The productivity frontier isn't about profit margins specifically - it's about the tradeoff between performance (what customers value) and cost. A firm on the frontier delivers the maximum performance for a given cost level, regardless of profit margin."
                    },
                    {
                        letter: "B",
                        text: "The set of positions offering the maximum performance for a given cost, representing the current state-of-the-art.",
                        correct: true,
                        feedback: "Correct! The productivity frontier shows all the positions where you're getting the BEST possible performance for a given cost level (or lowest cost for a given performance level). Being ON the frontier means you're using best practices; being BELOW means you're stuck in the middle with no competitive advantage."
                    },
                    {
                        letter: "C",
                        text: "The boundary between profitable and unprofitable strategic positions.",
                        correct: false,
                        feedback: "This confuses the frontier with profitability. The frontier is about the performance-cost tradeoff, not profit vs. loss. A firm can be on the frontier but unprofitable (if industry forces are too strong), or below the frontier but profitable (if they have other advantages like patents)."
                    },
                    {
                        letter: "D",
                        text: "The average performance level across all competitors in an industry.",
                        correct: false,
                        feedback: "No - the frontier represents the BEST performance-cost combinations achievable, not the average. Most firms are actually BELOW the frontier ('stuck in the middle'). The frontier is aspirational, showing what's possible with best practices and clear strategic positioning."
                    }
                ]
            },
            {
                id: 2,
                text: "A company is 'stuck in the middle' when it:",
                choices: [
                    {
                        letter: "A",
                        text: "Operates in a mid-market segment targeting average-income customers.",
                        correct: false,
                        feedback: "Being 'stuck in the middle' is NOT about the mid-market customer segment - it's about strategic incoherence. You can successfully target mid-market customers with a coherent position (e.g., Olive Garden). 'Stuck in the middle' means offering mediocre performance at mediocre cost with no clear advantage."
                    },
                    {
                        letter: "B",
                        text: "Falls below the productivity frontier by trying to achieve both low cost AND high differentiation without the capabilities to execute either effectively.",
                        correct: true,
                        feedback: "Exactly! 'Stuck in the middle' means you're trying to compete on BOTH dimensions simultaneously but achieving neither - you're not as cheap as cost leaders and not as good as differentiators. This puts you below the frontier with no competitive advantage, making you vulnerable."
                    },
                    {
                        letter: "C",
                        text: "Competes in an industry with moderate rivalry and average profitability.",
                        correct: false,
                        feedback: "Industry attractiveness and strategic position are different concepts. 'Stuck in the middle' refers to a firm's position relative to the frontier (below it with no clear advantage), not the industry's average profitability. You can be stuck in the middle in any industry."
                    },
                    {
                        letter: "D",
                        text: "Has market share between the industry leader and smallest competitors.",
                        correct: false,
                        feedback: "Market share is not the defining feature of being stuck in the middle. A mid-sized firm can have a clear strategic position (e.g., Southwest Airlines had small share initially but a clear low-cost position). 'Stuck in the middle' is about lacking a clear performance-cost advantage, not market position."
                    }
                ]
            },
            {
                id: 3,
                text: "Which of the following BEST describes the primary strategic risk faced by high-end differentiators?",
                choices: [
                    {
                        letter: "A",
                        text: "Commodification - when mid-market competitors improve quality enough to satisfy most customers at lower prices.",
                        correct: true,
                        feedback: "Correct! The core risk for high-end positions is commodification - when 'good enough' from mid-market firms becomes truly good enough for most customers. If mid-market quality rises while price stays lower, the high-end value proposition collapses (e.g., Toyota/Honda threatening BMW/Mercedes, or business class threatening first class)."
                    },
                    {
                        letter: "B",
                        text: "Price competition from other premium brands in the same segment.",
                        correct: false,
                        feedback: "Price competition within the high-end segment is less threatening than commodification. If all high-end firms maintain differentiation, they can all coexist profitably (e.g., Ferrari, Lamborghini, Porsche). The real threat is when mid-market firms climb the frontier and make the premium unnecessary."
                    },
                    {
                        letter: "C",
                        text: "Rising input costs that squeeze profit margins.",
                        correct: false,
                        feedback: "While rising costs affect profitability, this isn't the STRATEGIC risk unique to high-end positions - cost increases affect all positions. The distinctive risk for high-end differentiators is commodification, where their performance advantage becomes irrelevant because mid-market quality becomes sufficient."
                    },
                    {
                        letter: "D",
                        text: "Difficulty finding enough customers willing to pay premium prices.",
                        correct: false,
                        feedback: "Market frequency (proportion of customers wanting premium) is a consideration when choosing a position, not the primary RISK once positioned. The real strategic risk for high-end firms is commodification - when customers who USED to be willing to pay premium prices no longer need to because mid-market quality improved."
                    }
                ]
            },
            {
                id: 4,
                text: "A price-sensitive (low-cost) strategic position is MOST vulnerable when:",
                choices: [
                    {
                        letter: "A",
                        text: "A disruptive innovation makes it possible to deliver high performance at very low cost, shifting the entire productivity frontier.",
                        correct: true,
                        feedback: "Exactly! Low-cost positions depend on customers accepting lower performance in exchange for lower prices. When disruptive innovation shifts the frontier (e.g., Southwest's point-to-point model, or Walmart's logistics systems), suddenly everyone can have better performance at low cost. The low-cost player's main advantage (price) becomes less relevant if performance gaps disappear."
                    },
                    {
                        letter: "B",
                        text: "Customers in the market become wealthier and start preferring premium products.",
                        correct: false,
                        feedback: "While shifting customer preferences toward premium can shrink the price-sensitive segment, this isn't the most severe threat. Even if the segment shrinks, price-sensitive customers still exist and still value low prices. The more fundamental threat is disruptive innovation that eliminates the performance tradeoff entirely."
                    },
                    {
                        letter: "C",
                        text: "A competitor launches an aggressive price war to gain market share.",
                        correct: false,
                        feedback: "Price wars hurt profitability, but they're not the STRATEGIC vulnerability unique to low-cost positions. In fact, low-cost firms are often best positioned to survive price wars (lowest costs = highest margins to sacrifice). The deeper threat is when innovation makes the low-cost/low-performance position obsolete."
                    },
                    {
                        letter: "D",
                        text: "Government regulations increase minimum quality standards in the industry.",
                        correct: false,
                        feedback: "While regulations that force higher quality/cost can hurt low-cost positions, this is more of an operational challenge than a strategic vulnerability. The fundamental strategic risk is disruptive innovation that makes it possible to deliver BOTH low cost AND high performance, making the low-cost position's tradeoff irrelevant."
                    }
                ]
            },
            {
                id: 5,
                text: "How does strategic positioning relate to goal-setting?",
                choices: [
                    {
                        letter: "A",
                        text: "High-end positions always deliver higher ROA, so companies should always choose differentiation.",
                        correct: false,
                        feedback: "This is too simplistic. While high-end positions often have higher margins, they also serve smaller segments (lower market frequency) and face commodification risk. Low-cost positions can deliver excellent ROA through volume and operational efficiency (e.g., Walmart, Southwest). Position choice depends on capabilities, not universal superiority."
                    },
                    {
                        letter: "B",
                        text: "Your chosen position determines realistic performance targets - high-end can target higher margins but lower volume, while price-sensitive positions target lower margins but higher volume.",
                        correct: true,
                        feedback: "Correct! Strategic position sets realistic goals within industry constraints. High-end positions typically see 15-25% margins on lower volume (15% market frequency), price-sensitive positions see 5-10% margins on higher volume (30% frequency). Your position determines the specific 'mountain' you're climbing, beyond just industry averages."
                    },
                    {
                        letter: "C",
                        text: "Strategic positioning is irrelevant to goal-setting since industry structure determines everything.",
                        correct: false,
                        feedback: "Both matter! Industry structure (~20% of profit variance) sets general constraints, but position within the industry determines your SPECIFIC realistic goals. Two firms in the same industry can have very different targets: Four Seasons (high-end, 20% margins) vs. Motel 6 (price-sensitive, 8% margins) both in hospitality."
                    },
                    {
                        letter: "D",
                        text: "Companies should set goals first, then choose a strategic position that can deliver those goals.",
                        correct: false,
                        feedback: "This reverses the logic. You can't arbitrarily set goals and then find a position to deliver them - structural constraints (industry forces + position economics) limit what's possible. You should understand industry attractiveness and position tradeoffs FIRST, then set realistic goals based on your chosen position and capabilities."
                    }
                ]
            }
        ];

        let currentQuestionIndex = 0;
        let userAnswers = [];
        let quizCompleted = false;

        function initQuiz() {
            renderQuestion();
            updateProgress();
        }

        function renderQuestion() {
            const question = questions[currentQuestionIndex];
            const container = document.getElementById('quiz-container');

            const choicesHTML = question.choices.map(choice => `
                <div class="choice ${isChoiceSelected(choice.letter) ? 'selected' : ''} ${getChoiceClass(choice.letter)}"
                     onclick="selectChoice('${choice.letter}')"
                     data-letter="${choice.letter}">
                    <div class="choice-letter">${choice.letter}</div>
                    <div class="choice-text">${choice.text}</div>
                </div>
            `).join('');

            const feedbackHTML = getFeedback();

            container.innerHTML = `
                <div class="question-card">
                    <div class="question-number">Question ${currentQuestionIndex + 1} of ${questions.length}</div>
                    <div class="question-text">${question.text}</div>
                    <div class="choices">
                        ${choicesHTML}
                    </div>
                    ${feedbackHTML}
                </div>
            `;

            document.getElementById('nav-buttons').style.display = 'flex';
            updateNavigationButtons();
        }

        function isChoiceSelected(letter) {
            if (!userAnswers[currentQuestionIndex]) return false;
            return userAnswers[currentQuestionIndex].selected === letter;
        }

        function getChoiceClass(letter) {
            const answer = userAnswers[currentQuestionIndex];
            if (!answer || !answer.submitted) return '';

            const question = questions[currentQuestionIndex];
            const choice = question.choices.find(c => c.letter === letter);

            if (choice.correct) return 'correct';
            if (answer.selected === letter) return 'incorrect';
            return 'disabled';
        }

        function getFeedback() {
            const answer = userAnswers[currentQuestionIndex];
            if (!answer || !answer.submitted) return '';

            const question = questions[currentQuestionIndex];
            const selectedChoice = question.choices.find(c => c.letter === answer.selected);

            const isCorrect = selectedChoice.correct;
            const headerClass = isCorrect ? 'correct' : 'incorrect';
            const headerText = isCorrect ? '✓ Correct!' : '✗ Incorrect';

            return `
                <div class="feedback show">
                    <div class="feedback-header ${headerClass}">${headerText}</div>
                    <div class="feedback-text">${selectedChoice.feedback}</div>
                </div>
            `;
        }

        function selectChoice(letter) {
            const answer = userAnswers[currentQuestionIndex];
            if (answer && answer.submitted) return; // Already submitted

            userAnswers[currentQuestionIndex] = {
                selected: letter,
                submitted: true
            };

            renderQuestion();
            updateProgress();
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function updateNavigationButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            prevBtn.disabled = currentQuestionIndex === 0;

            const answer = userAnswers[currentQuestionIndex];
            nextBtn.disabled = !answer || !answer.submitted;

            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.textContent = 'View Results';
            } else {
                nextBtn.textContent = 'Next Question';
            }
        }

        function updateProgress() {
            const completed = userAnswers.filter(a => a && a.submitted).length;
            const percentage = (completed / questions.length) * 100;

            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('progress-text').textContent = `${completed}/${questions.length}`;
        }

        function showResults() {
            let correctCount = 0;

            questions.forEach((question, index) => {
                const answer = userAnswers[index];
                if (answer) {
                    const choice = question.choices.find(c => c.letter === answer.selected);
                    if (choice && choice.correct) correctCount++;
                }
            });

            const incorrectCount = questions.length - correctCount;
            const percentage = Math.round((correctCount / questions.length) * 100);

            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('nav-buttons').style.display = 'none';

            const resultsCard = document.getElementById('results-card');
            resultsCard.classList.add('show');

            document.getElementById('final-score').textContent = `${correctCount}/${questions.length}`;
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('incorrect-count').textContent = incorrectCount;
            document.getElementById('percentage').textContent = percentage + '%';

            let message = '';
            if (percentage >= 80) {
                message = 'Excellent work! You have a strong grasp of strategic positioning concepts. You\'re ready to apply these ideas to evaluate real strategic choices.';
            } else if (percentage >= 60) {
                message = 'Good progress! You understand the basics, but reviewing the material on ' + getWeakAreas() + ' would strengthen your foundation before moving forward.';
            } else {
                message = 'Consider reviewing the Part 3 content before continuing. Focus especially on ' + getWeakAreas() + '. These concepts are essential for understanding value proposition and competitive advantage.';
            }

            document.getElementById('results-message').textContent = message;
            quizCompleted = true;
        }

        function getWeakAreas() {
            const areas = [];

            questions.forEach((question, index) => {
                const answer = userAnswers[index];
                if (answer) {
                    const choice = question.choices.find(c => c.letter === answer.selected);
                    if (!choice || !choice.correct) {
                        if (index === 0) areas.push('the productivity frontier concept');
                        if (index === 1) areas.push('stuck in the middle positions');
                        if (index === 2) areas.push('risks for high-end differentiators');
                        if (index === 3) areas.push('vulnerabilities of low-cost positions');
                        if (index === 4) areas.push('how positioning affects goals');
                    }
                }
            });

            if (areas.length === 0) return 'all concepts';
            if (areas.length === 1) return areas[0];
            if (areas.length === 2) return areas.join(' and ');
            return areas.slice(0, -1).join(', ') + ', and ' + areas[areas.length - 1];
        }

        function reviewAnswers() {
            document.getElementById('results-card').classList.remove('show');
            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('nav-buttons').style.display = 'flex';
            currentQuestionIndex = 0;
            renderQuestion();
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            userAnswers = [];
            quizCompleted = false;

            document.getElementById('results-card').classList.remove('show');
            document.getElementById('quiz-container').style.display = 'block';

            initQuiz();
        }

        // Initialize quiz on page load
        initQuiz();
    </script>
</body>
</html>
