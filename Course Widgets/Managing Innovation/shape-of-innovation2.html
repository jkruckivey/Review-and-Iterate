<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Shape of Innovation</title>
<style>
  :root {
    --ivey-green: #034638;
    --pale-sage: #c0d1cd;
    --pale-blue: #bfe5e7;
    --pale-purple: #d5cae0;
    --cream: #faf9f5;
    --white: #ffffff;
    --text-dark: #1a1a1a;
    --text-mid: #3a3a3a;
    --text-light: #5a6a68;
    --border: #dde8e6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, var(--pale-sage) 0%, var(--pale-blue) 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }

  .infographic {
    background: var(--white);
    border-radius: 14px;
    box-shadow: 0 16px 48px rgba(3,70,56,0.15);
    width: 100%;
    max-width: 1000px;
    padding: 44px 48px 48px;
  }

  .col-headers {
    display: grid;
    grid-template-columns: 1fr 60px 1fr;
    margin-bottom: 28px;
    align-items: center;
  }

  .col-header-pill {
    display: block;
    padding: 12px 24px;
    border-radius: 40px;
    font-size: 0.88em;
    font-weight: 700;
    text-align: center;
  }

  .pill-left  { background: var(--ivey-green); color: var(--white); }
  .pill-right { background: var(--pale-purple); color: var(--text-dark); }

  .body-cols {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    align-items: start;
  }

  .divider { background: var(--border); align-self: stretch; }

  .col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .col-left  { padding: 0 36px 0 0; }
  .col-right { padding: 0 0 0 36px; }

  .col-caption {
    font-size: 0.72em;
    color: var(--text-light);
    font-style: italic;
    text-align: center;
    margin-top: 16px;
    margin-bottom: 8px;
    line-height: 1.5;
  }

  .col-pill {
    display: inline-block;
    font-size: 0.69em;
    font-weight: 600;
    padding: 4px 16px;
    border-radius: 20px;
  }

  .cpill-blue   { background: var(--pale-blue);   color: var(--ivey-green); }
  .cpill-purple { background: var(--pale-purple);  color: var(--ivey-green); }

  .seq-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .seq-box {
    width: 100%;
    max-width: 210px;
    padding: 10px 14px;
    border-radius: 10px;
    text-align: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 0.78em;
    font-weight: 600;
    color: var(--text-dark);
  }

  .sb1 { background: var(--pale-purple); }
  .sb2 { background: var(--cream); border: 1px solid var(--border); }
  .sb3 { background: var(--pale-blue); }
  .sb4 { background: var(--pale-sage); }
  .sb5 { background: var(--pale-blue); filter: brightness(0.88); }

  .seq-final {
    background: var(--ivey-green);
    color: var(--white);
    border-radius: 20px;
    width: 90px;
    padding: 8px 0;
    text-align: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 0.78em;
    font-weight: 700;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="infographic">

  <div class="col-headers">
    <span class="col-header-pill pill-left">Iterative</span>
    <div></div>
    <span class="col-header-pill pill-right">Sequential</span>
  </div>

  <div class="body-cols">

    <!-- LEFT: Cycle SVG -->
    <div class="col col-left">
      <svg width="100%" viewBox="0 0 340 340" xmlns="http://www.w3.org/2000/svg" style="max-width:300px;">
        <defs>
          <marker id="ah" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
            <path d="M0,0 L9,4.5 L0,9 Z" fill="#5a6a68"/>
          </marker>
        </defs>

        <!-- Guide circle -->
        <circle cx="170" cy="170" r="110" fill="none" stroke="#dde8e6" stroke-width="1.5" stroke-dasharray="5,4"/>

        <!-- ARROWS (behind nodes) using corner control points for clean circular arcs -->
        <!-- TOP → RIGHT: from right edge of TOP node → top edge of RIGHT node -->
        <path d="M 220,47 Q 295,47 272,138" stroke="#5a6a68" stroke-width="2" fill="none" marker-end="url(#ah)"/>
        <!-- RIGHT → BOTTOM: from bottom edge of RIGHT → right edge of BOTTOM -->
        <path d="M 272,204 Q 295,295 220,295" stroke="#5a6a68" stroke-width="2" fill="none" marker-end="url(#ah)"/>
        <!-- BOTTOM → LEFT: from left edge of BOTTOM → bottom edge of LEFT -->
        <path d="M 120,295 Q 45,295 68,204" stroke="#5a6a68" stroke-width="2" fill="none" marker-end="url(#ah)"/>
        <!-- LEFT → TOP: from top edge of LEFT → left edge of TOP -->
        <path d="M 68,138 Q 45,47 120,47" stroke="#5a6a68" stroke-width="2" fill="none" marker-end="url(#ah)"/>

        <!-- TOP node: Generate Product -->
        <rect x="120" y="22" width="100" height="52" rx="9" fill="#bfe5e7"/>
        <text x="170" y="43" text-anchor="middle" font-family="Segoe UI, Tahoma, Geneva, Verdana, sans-serif" font-size="12.5" font-weight="600" fill="#1a1a1a">Generate</text>
        <text x="170" y="60" text-anchor="middle" font-family="Segoe UI, Tahoma, Geneva, Verdana, sans-serif" font-size="12.5" font-weight="600" fill="#1a1a1a">Product</text>

        <!-- RIGHT node: Expose Customer to Product -->
        <rect x="236" y="130" width="98" height="72" rx="9" fill="#faf9f5" stroke="#dde8e6" stroke-width="1.5"/>
        <text x="285" y="153" text-anchor="middle" font-family="Segoe UI, Tahoma, Geneva, Verdana, sans-serif" font-size="11" font-weight="600" fill="#1a1a1a">Expose</text>
        <text x="285" y="169" text-anchor="middle" font-family="Segoe UI, Tahoma, Geneva, Verdana, sans-serif" font-size="11" font-weight="600" fill="#1a1a1a">Customer</text>
        <text x="285" y="185" text-anchor="middle" font-family="Segoe UI, Tahoma, Geneva, Verdana, sans-serif" font-size="11" font-weight="600" fill="#1a1a1a">to Product</text>

        <!-- BOTTOM node: Conversation with Customer about Product -->
        <rect x="96" y="268" width="148" height="52" rx="9" fill="#c0d1cd"/>
        <text x="170" y="288" text-anchor="middle" font-family="Segoe UI, Tahoma, Geneva, Verdana, sans-serif" font-size="11" font-weight="600" fill="#1a1a1a">Conversation with</text>
        <text x="170" y="304" text-anchor="middle" font-family="Segoe UI, Tahoma, Geneva, Verdana, sans-serif" font-size="11" font-weight="600" fill="#1a1a1a">Customer about Product</text>

        <!-- LEFT node: Repeat & Refine -->
        <rect x="6" y="130" width="98" height="72" rx="9" fill="#d5cae0"/>
        <text x="55" y="160" text-anchor="middle" font-family="Segoe UI, Tahoma, Geneva, Verdana, sans-serif" font-size="12.5" font-weight="600" fill="#1a1a1a">Repeat</text>
        <text x="55" y="178" text-anchor="middle" font-family="Segoe UI, Tahoma, Geneva, Verdana, sans-serif" font-size="12.5" font-weight="600" fill="#1a1a1a">&amp; Refine</text>

        <!-- Center -->
        <circle cx="170" cy="170" r="18" fill="#faf9f5" stroke="#dde8e6" stroke-width="1.5"/>
      </svg>

      <div class="col-caption">Software Development at Trilogy</div>
      <span class="col-pill cpill-blue">Each cycle deepens understanding</span>
    </div>

    <div class="divider"></div>

    <!-- RIGHT: Sequential -->
    <div class="col col-right">
      <div class="seq-stack">
        <div class="seq-box sb1">Concept Generation</div>
        <svg width="12" height="20" viewBox="0 0 12 20" style="display:block;margin:0 auto;"><line x1="6" y1="0" x2="6" y2="13" stroke="#5a6a68" stroke-width="2"/><polygon points="0,11 6,20 12,11" fill="#5a6a68"/></svg>
        <div class="seq-box sb2">Product Planning</div>
        <svg width="12" height="20" viewBox="0 0 12 20" style="display:block;margin:0 auto;"><line x1="6" y1="0" x2="6" y2="13" stroke="#5a6a68" stroke-width="2"/><polygon points="0,11 6,20 12,11" fill="#5a6a68"/></svg>
        <div class="seq-box sb3">Product Engineering</div>
        <svg width="12" height="20" viewBox="0 0 12 20" style="display:block;margin:0 auto;"><line x1="6" y1="0" x2="6" y2="13" stroke="#5a6a68" stroke-width="2"/><polygon points="0,11 6,20 12,11" fill="#5a6a68"/></svg>
        <div class="seq-box sb4">Process Engineering</div>
        <svg width="12" height="20" viewBox="0 0 12 20" style="display:block;margin:0 auto;"><line x1="6" y1="0" x2="6" y2="13" stroke="#5a6a68" stroke-width="2"/><polygon points="0,11 6,20 12,11" fill="#5a6a68"/></svg>
        <div class="seq-box sb5">Production Process</div>
        <svg width="12" height="20" viewBox="0 0 12 20" style="display:block;margin:0 auto;"><line x1="6" y1="0" x2="6" y2="13" stroke="#5a6a68" stroke-width="2"/><polygon points="0,11 6,20 12,11" fill="#5a6a68"/></svg>
        <div class="seq-final">Product</div>
      </div>

      <div class="col-caption">Clark and Fujimoto's Description<br>of the Automaking Process</div>
      <span class="col-pill cpill-purple">Each stage hands off, never returns</span>
    </div>

  </div>
</div>

</body>
</html>
