<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Learning Outcomes</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --color-neutral-50: #fafafa;
            --color-neutral-100: #f5f5f5;
            --color-neutral-200: #e5e5e5;
            --color-neutral-300: #d4d4d4;
            --color-neutral-400: #a3a3a3;
            --color-neutral-500: #737373;
            --color-neutral-600: #525252;
            --color-neutral-700: #404040;
            --color-neutral-800: #262626;
            --color-neutral-900: #171717;

            --color-clo: #6b9085;
            --color-week: #5a9ea1;
        }

        body {
            font-family: 'Geist', -apple-system, sans-serif;
            background: white;
            color: var(--color-neutral-900);
            padding: 1.5rem;
            line-height: 1.6;
        }

        .outcomes-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .header h3 {
            color: var(--color-neutral-900);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--color-neutral-600);
            font-size: 0.9rem;
        }

        .help-text {
            background: var(--color-neutral-50);
            border-left: 3px solid var(--color-clo);
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
        }

        .help-text p {
            color: var(--color-neutral-700);
            font-size: 0.85rem;
        }

        .help-text strong {
            color: var(--color-neutral-900);
        }

        .clo-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .clo-item {
            background: white;
            border: 2px solid var(--color-neutral-200);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .clo-item:hover {
            border-color: var(--color-clo);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .clo-item:focus {
            outline: 2px solid #3182ce;
            outline-offset: 2px;
        }

        .clo-item.active {
            border-color: var(--color-clo);
            box-shadow: 0 4px 12px rgba(82, 107, 105, 0.15);
        }

        .clo-header {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 1rem;
        }

        .clo-code {
            background: var(--color-clo);
            color: white;
            padding: 0.25rem 0.625rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .clo-content {
            flex-grow: 1;
        }

        .clo-text {
            color: var(--color-neutral-900);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .clo-hint {
            color: var(--color-neutral-500);
            font-size: 0.8rem;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .clo-item.active .clo-hint {
            display: none;
        }

        .expand-icon {
            color: var(--color-neutral-400);
            font-size: 1.2rem;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .clo-item.active .expand-icon {
            transform: rotate(180deg);
        }

        .week-preview {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: var(--color-neutral-50);
            border-top: 1px solid var(--color-neutral-200);
        }

        .clo-item.active .week-preview {
            max-height: 500px;
        }

        .week-preview-inner {
            padding: 1rem;
        }

        .preview-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--color-neutral-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }

        .week-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .week-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: white;
            border: 1px solid var(--color-neutral-200);
            border-radius: 6px;
            padding: 0.75rem;
        }

        .week-badge {
            background: var(--color-week);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .week-name {
            color: var(--color-neutral-700);
            font-size: 0.875rem;
        }

        .footer-note {
            margin-top: 1.5rem;
            padding: 1rem;
            background: linear-gradient(135deg, #f0f5f4 0%, #f5f5f5 100%);
            border-radius: 8px;
            text-align: center;
        }

        .footer-note p {
            color: var(--color-neutral-600);
            font-size: 0.85rem;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            .clo-header { flex-direction: column; gap: 0.5rem; }
            .expand-icon { display: none; }
        }
    </style>
</head>
<body>
    <div class="outcomes-container">
        <div class="header">
            <h3>Course Learning Outcomes</h3>
            <p>By the end of this course, you'll be able to:</p>
        </div>

        <div class="help-text">
            <p><strong>How to use:</strong> Click any outcome to preview which weeks will help you develop that skill.</p>
        </div>

        <div class="clo-list" role="list" id="clo-list"></div>

        <div class="footer-note">
            <p>You'll see these outcomes at the start of every week to track your progress toward mastery.</p>
        </div>
    </div>

    <div role="status" aria-live="polite" class="sr-only" id="announcements"></div>

    <script>
        const courseOutcomes = [
            {
                code: 'CLO 1',
                text: 'Explain how artificial intelligence and machine learning work, including key concepts like supervised learning, neural networks, and large language models, in plain language suitable for business contexts.',
                weeks: [
                    { code: 'Week 1', name: 'Foundations of AI' },
                    { code: 'Week 2', name: 'Building with AI' },
                    { code: 'Week 4', name: 'Advanced AI' }
                ]
            },
            {
                code: 'CLO 2',
                text: 'Build functional AI prototypes including chatbots, Custom GPTs, and knowledge-based assistants, using no-code and low-code tools.',
                weeks: [
                    { code: 'Week 2', name: 'Building with AI' },
                    { code: 'Week 5', name: 'AI Innovation' }
                ]
            },
            {
                code: 'CLO 3',
                text: 'Apply prompt engineering techniques to improve AI outputs, including zero-shot, few-shot, persona, and constraint patterns.',
                weeks: [
                    { code: 'Week 2', name: 'Building with AI' },
                    { code: 'Week 5', name: 'AI Innovation' }
                ]
            },
            {
                code: 'CLO 4',
                text: 'Evaluate AI systems using appropriate metrics (precision, recall, F1) and identify potential issues including bias, drift, and disparate impact across user groups.',
                weeks: [
                    { code: 'Week 3', name: 'Measuring AI' },
                    { code: 'Week 4', name: 'Advanced AI' }
                ]
            },
            {
                code: 'CLO 5',
                text: 'Distinguish between AI customization approaches (prompt engineering, RAG, and fine-tuning) and recommend the appropriate approach for different business use cases.',
                weeks: [
                    { code: 'Week 2', name: 'Building with AI' },
                    { code: 'Week 4', name: 'Advanced AI' },
                    { code: 'Week 5', name: 'AI Innovation' }
                ]
            },
            {
                code: 'CLO 6',
                text: 'Analyze the technical foundations of modern AI (transformer architecture, retrieval augmented generation, and agentic AI) to make informed decisions about AI adoption and implementation.',
                weeks: [
                    { code: 'Week 2', name: 'Building with AI' },
                    { code: 'Week 4', name: 'Advanced AI' },
                    { code: 'Week 5', name: 'AI Innovation' }
                ]
            },
            {
                code: 'CLO 7',
                text: 'Implement responsible AI practices throughout the AI lifecycle, including guardrails, human oversight, fairness testing, and governance frameworks.',
                weeks: [
                    { code: 'Week 1', name: 'Foundations of AI' },
                    { code: 'Week 2', name: 'Building with AI' },
                    { code: 'Week 3', name: 'Measuring AI' },
                    { code: 'Week 4', name: 'Advanced AI' },
                    { code: 'Week 5', name: 'AI Innovation' }
                ]
            },
            {
                code: 'CLO 8',
                text: 'Communicate AI concepts, capabilities, limitations, and risks to both technical and non-technical stakeholders.',
                weeks: [
                    { code: 'Week 1', name: 'Foundations of AI' },
                    { code: 'Week 5', name: 'AI Innovation' }
                ]
            }
        ];

        const cloList = document.getElementById('clo-list');
        let activeItem = null;

        courseOutcomes.forEach((clo, index) => {
            const div = document.createElement('div');
            div.className = 'clo-item';
            div.setAttribute('tabindex', '0');
            div.setAttribute('role', 'button');
            div.setAttribute('aria-expanded', 'false');
            div.setAttribute('aria-label', `${clo.code}: ${clo.text}. Click to see contributing weeks.`);

            const weekItems = clo.weeks.map(w => `
                <div class="week-item">
                    <span class="week-badge">${w.code}</span>
                    <span class="week-name">${w.name}</span>
                </div>
            `).join('');

            div.innerHTML = `
                <div class="clo-header">
                    <span class="clo-code">${clo.code}</span>
                    <div class="clo-content">
                        <div class="clo-text">${clo.text}</div>
                        <div class="clo-hint">Click to see weeks</div>
                    </div>
                    <span class="expand-icon" aria-hidden="true">▼</span>
                </div>
                <div class="week-preview">
                    <div class="week-preview-inner">
                        <div class="preview-label">Developed in these weeks:</div>
                        <div class="week-list">
                            ${weekItems}
                        </div>
                    </div>
                </div>
            `;

            div.onclick = () => toggleCLO(div, clo);
            div.onkeydown = (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleCLO(div, clo);
                }
            };

            cloList.appendChild(div);
        });

        function toggleCLO(element, clo) {
            const wasActive = element.classList.contains('active');

            document.querySelectorAll('.clo-item').forEach(el => {
                el.classList.remove('active');
                el.setAttribute('aria-expanded', 'false');
            });

            if (!wasActive) {
                element.classList.add('active');
                element.setAttribute('aria-expanded', 'true');
                activeItem = clo.code;
                announce(`${clo.code} expanded. Developed in ${clo.weeks.length} weeks.`);
            } else {
                activeItem = null;
                announce('Collapsed');
            }
        }

        function announce(message) {
            const announcer = document.getElementById('announcements');
            announcer.textContent = message;
            setTimeout(() => { announcer.textContent = ''; }, 1000);
        }
    </script>
</body>
</html>
